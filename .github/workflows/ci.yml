name: ci
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    # Keep CI on the same deterministic Apple Silicon image as release.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Require Apple Silicon runner
        run: test "$(uname -m)" = arm64
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            sidecar/package-lock.json
            gallery/package-lock.json
            mobile/package-lock.json
            packages/atelier-protocol/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install root deps
        run: npm ci
      - name: Install sidecar deps
        run: npm --prefix sidecar ci
      - name: Install gallery deps
        run: npm --prefix gallery ci
      - name: Install mobile deps
        run: npm --prefix mobile ci
      - name: Install shared protocol deps
        run: npm --prefix packages/atelier-protocol ci
      - name: Install Playwright browsers
        run: cd gallery && npx playwright install chromium webkit
      - name: Stage bundled resources for Tauri checks
        run: |
          bash scripts/stage-node-runtime.sh
          bash scripts/stage-sidecar.sh
          bash scripts/stage-gallery.sh
          bash scripts/stage-mobile.sh
          bash scripts/stage-appsnap.sh
      - name: Backend policy (Rust default, soak gates)
        run: npm run check:backend-policy
      - name: Verify (typecheck, build, frontend, sidecar, gallery, Rust)
        run: npm run verify
        env:
          # Production ships the Rust backend and Node gallery runtime. The
          # legacy Python reference remains available for local migration checks.
          ATELIER_SKIP_LEGACY_PYTHON_PARITY: "1"
      - name: Gallery E2E
        run: npm run verify:e2e
      - name: Install Playwright Chromium (root, golden states)
        run: npx playwright install chromium
      - name: Visual golden states (plan 021 — baselines committées, jamais d'auto-update)
        run: npm run test:visual
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            gallery/test-results
            tests/visual/test-results
            playwright-report
          if-no-files-found: ignore
