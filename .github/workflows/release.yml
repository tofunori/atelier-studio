name: release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    # macos-15 is the Apple Silicon image; Node and node-pty are arm64-only.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Require Apple Silicon runner
        run: test "$(uname -m)" = arm64
      - uses: actions/cache@v4
        with:
          path: .cache/node-runtime
          key: node-runtime-22.22.3-darwin-arm64
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install frontend deps
        run: npm ci
      - name: Install sidecar deps (pour le staging)
        run: cd sidecar && npm ci
      - name: Install gallery deps
        run: npm --prefix gallery ci
      - name: Install Playwright Chromium
        run: cd gallery && npx playwright install chromium
      - name: Stage embedded Node runtime for Tauri checks
        run: bash scripts/stage-node-runtime.sh
      # le tag peut contourner la CI de PR : verify + E2E bloquent le bundle ici
      - name: Verify (typecheck, build, frontend, sidecar, gallery, Rust)
        run: npm run verify
        env:
          # The shipped gallery runtime is Node and the app backend is Rust.
          # Keep Python parity for local migration checks, but do not let the
          # legacy reference interpreter block production release runners.
          ATELIER_SKIP_LEGACY_PYTHON_PARITY: "1"
      - name: Gallery E2E
        run: npm run verify:e2e
      - name: Build + bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --config src-tauri/tauri.release.conf.json
          tagName: ${{ github.ref_name }}
          releaseName: "Atelier Studio ${{ github.ref_name }}"
          releaseBody: |
            Atelier Studio 1.3 introduces the Rust-first agent runtime, a shared
            desktop/mobile protocol, the first iOS companion foundation, a remote
            gateway, and a major reliability and usability pass across chat, the
            scientific gallery, and the LaTeX/CodeMirror editor.

            See `docs/releases/v1.3.0.md` in the repository for the complete
            release notes, upgrade guidance, validation coverage, and known limits.

            **Platform:** macOS on Apple Silicon.

            The packaged app includes Node.js 22 and the gallery runtime. No
            separate Node.js or Python installation is required for the app.
            Claude Code CLI (2.1.139 or newer) and Codex CLI remain external
            prerequisites for their respective providers.

            If macOS Gatekeeper blocks an unsigned download, run:
            `xattr -cr "/Applications/Atelier.app"`
          releaseDraft: true
          prerelease: false
      - name: Verify embedded Node artifact
        run: |
          NODE="src-tauri/target/release/bundle/macos/Atelier.app/Contents/Resources/node-runtime/bin/node"
          test -x "$NODE"
          test "$("$NODE" --version)" = "v22.22.3"
          file "$NODE" | grep -q "arm64"
