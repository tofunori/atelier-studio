name: release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install frontend deps
        run: npm ci
      - name: Install sidecar deps (pour le staging)
        run: cd sidecar && npm ci
      - name: Install gallery deps
        run: npm --prefix gallery ci
      - name: Install Playwright Chromium
        run: cd gallery && npx playwright install chromium
      # le tag peut contourner la CI de PR : verify + E2E bloquent le bundle ici
      - name: Verify (typecheck, build, frontend, sidecar, gallery, Rust)
        run: npm run verify
      - name: Gallery E2E
        run: npm run verify:e2e
      - name: Build + bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Atelier Studio ${{ github.ref_name }}"
          releaseBody: |
            macOS (Apple Silicon). App non signée : après installation,
            lancer `xattr -cr "/Applications/Atelier.app"` pour passer Gatekeeper.
            Prérequis : Claude Code CLI (>= 2.1.139), Codex CLI, Node.js >= 20.
            La galerie est embarquée et tourne en Node — plus aucune dépendance Python.
          releaseDraft: true
          prerelease: false
