<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atelier · atelier-studio</title>
<script src="/.fig_thumbs/cm6/editor.bundle.js"></script>
<script src="/.fig_thumbs/editor/languages.js"></script>
<style>
  :root{--ui-font:-apple-system,'SF Pro Text','Inter Variable',sans-serif;--code-font:ui-monospace,'SF Mono',Menlo,monospace; --bg:#141619; --card:#1c1f23; --card2:#22262b; --txt:#dbdfe5; --muted:#9aa1ab; --faint:#6b727c;
         --accent:#7fa3d8; --accent-soft:#233246; --arch:#3a2f1a; --border:#2a2e34; --border-strong:#3a4048;
         --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.25);
         --code-bg:#1e2126;--code-fg:#d8d3c8;--code-keyword:#e07a5f;--code-function:#61afef;
         --code-string:#86c991;--code-number:#d19a66;--code-comment:#707985;--code-type:#c678dd;
         --code-operator:#abb2bf;--code-property:#e6c07b; }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--ui-font);
       background:var(--bg);color:var(--txt);font-size:13px}
  header{position:sticky;top:0;z-index:10;background:var(--card);background:color-mix(in srgb,var(--card) 92%,transparent);backdrop-filter:blur(8px);
         border-bottom:1px solid var(--border);padding:10px 16px 9px}
  .brand{display:flex;align-items:center;gap:9px;margin-bottom:9px;flex-wrap:nowrap}
  .brand-sp{flex:1;min-width:8px}
  /* la rangée reste sur une seule ligne : le nom de projet et le compteur
     se tronquent / disparaissent avant que les boutons ne passent à la ligne */
  .brand .logo,.brand .wm,.chip.dest{flex:none}
  .brand .proj{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:3}
  .project-switch{min-width:0;max-width:min(280px,32vw);height:26px;padding:0 6px;border:0;
    display:inline-flex;align-items:center;gap:5px;background:transparent;color:var(--muted);font:inherit}
  .project-switch:hover,.project-switch.on{background:var(--card2);border-color:transparent;color:var(--txt)}
  .project-switch svg{width:10px;height:10px;flex:none;transition:transform .12s ease}
  .project-switch.on svg{transform:rotate(180deg)}
  #projectMenu{position:fixed;z-index:150;display:none;width:min(330px,calc(100vw - 20px));padding:7px;
    border:1px solid var(--border-strong);border-radius:10px;background:color-mix(in srgb,var(--card) 97%,transparent);
    box-shadow:0 16px 42px rgba(0,0,0,.48);backdrop-filter:blur(12px)}
  #projectMenu.show{display:block}
  .project-menu-head{padding:5px 7px 7px;color:var(--muted);font-size:10px;font-weight:650;
    text-transform:uppercase;letter-spacing:.08em}
  .project-row{width:100%;height:auto;min-height:38px;padding:6px 8px;border:0;display:grid;
    grid-template-columns:16px minmax(0,1fr) auto;align-items:center;gap:7px;text-align:left;background:transparent}
  .project-row:hover,.project-row:focus-visible{background:var(--card2);outline:0}
  .project-row .project-mark{width:16px;color:var(--accent);text-align:center}
  .project-row .project-copy{min-width:0;display:flex;flex-direction:column;gap:2px}
  .project-row .project-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12.5px;color:var(--txt)}
  .project-row .project-state{font-size:10.5px;color:var(--muted)}
  .project-row .project-pin{font-size:10px;color:var(--faint)}
  .project-menu-add{width:100%;height:34px;margin-top:5px;border:0;border-top:1px solid var(--border);
    border-radius:0 0 6px 6px;display:flex;align-items:center;gap:8px;justify-content:flex-start;background:transparent;color:var(--muted)}
  .project-menu-add:hover{background:var(--card2);color:var(--txt);border-color:var(--border)}
  #projectMenuStatus{display:none;padding:7px;color:var(--muted);font-size:11px;border-top:1px solid var(--border)}
  #projectMenuStatus.show{display:block}
  .brand .stat{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:5}
  .chip.dest{background:transparent;border-color:transparent}
  .chip.dest:hover{background:var(--card2);border-color:var(--border)}
  .chip.dest.on{background:var(--card2);border-color:var(--border);color:var(--txt)}
  /* mode onglets : le chip IDE n'existe que quand le shell d'onglets est actif */
  #ideChip{display:none}
  body.use-tabs #ideChip{display:inline-flex}
  .icon-chip{padding:0;width:30px;justify-content:center;color:var(--muted)}
  .icon-chip:hover{color:var(--txt)}
  .icon-chip svg{display:block}
  #searchChip{display:none}
  #q.collapsed{width:auto;flex:1;min-width:170px;max-width:340px;opacity:1;pointer-events:auto}
  /* selects custom : le popup natif macOS est remplacé par un menu maison */
  .csel-btn{display:inline-flex;align-items:center;gap:7px;height:30px;padding:0 26px 0 11px;
    border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--txt);
    font-size:13px;cursor:pointer;position:relative;white-space:nowrap}
  .csel-btn::after{content:"";position:absolute;right:10px;top:50%;width:8px;height:5px;transform:translateY(-40%);
    background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' fill='none' stroke='%23868d9a' stroke-width='1.4' stroke-linecap='round' stroke-linejoin='round'/></svg>") no-repeat center}
  .csel-btn:hover{border-color:var(--border-strong)}
  .csel-menu{position:fixed;z-index:120;min-width:170px;max-height:340px;overflow-y:auto}
  /* fil d'événements Claude (Claude Code desktop) */
  #claudeToasts{position:fixed;right:14px;bottom:14px;z-index:130;display:flex;flex-direction:column;gap:8px;max-width:380px}
  .claude-toast{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-radius:10px;cursor:pointer;
    background:color-mix(in srgb,var(--card) 96%,transparent);border:1px solid var(--border-strong);
    box-shadow:0 10px 32px rgba(0,0,0,.45);font-size:12.5px;line-height:1.35;
    animation:ctIn .18s ease-out}
  .claude-toast .ic{flex:none;margin-top:1px;color:var(--accent)}
  .claude-toast .nm{font-weight:600;word-break:break-all}
  .claude-toast .nt{color:var(--muted);margin-top:2px}
  @keyframes ctIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .card.claude-flash{outline:2px solid var(--accent);outline-offset:2px;transition:outline-color 1s}
  .card.claude-flash.fade{outline-color:transparent}
  body.codex-host #annotPillTarget{display:none}
  .csel-menu div{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:13px;white-space:nowrap}
  .csel-menu div:hover{background:var(--card2)}
  .csel-menu div .ck{width:12px;flex:none;color:var(--accent);opacity:0}
  .csel-menu div.on .ck{opacity:1}
  #fmtMenu{min-width:0;width:min(340px,calc(100vw - 16px));max-height:min(520px,calc(100dvh - 18px));padding:0;overflow:hidden}
  #fmtMenu .fmt-head{padding:12px 14px 10px;border-bottom:1px solid var(--border)}
  #fmtMenu .fmt-title{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  #fmtMenu .fmt-title strong{font-size:13px;font-weight:650;color:var(--txt)}
  #fmtMenu .fmt-title span{font-size:11px;color:var(--muted)}
  #fmtMenu .fmt-search{width:100%;height:30px;margin-top:9px;padding:0 9px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--txt);font:inherit;font-size:12px}
  #fmtMenu .fmt-search:focus{outline:none;border-color:var(--accent)}
  #fmtMenu .fmt-presets{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px}
  #fmtMenu .fmt-preset{height:25px;padding:0 9px;border-radius:999px;font-size:11px;color:var(--muted);background:transparent}
  #fmtMenu .fmt-preset:hover{color:var(--txt);border-color:var(--border-strong)}
  #fmtMenu .fmt-body{padding:8px 8px 6px;overflow:auto;max-height:290px}
  #fmtMenu .fmt-section{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:3px 7px 4px}
  #fmtMenu .fmt-details{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));column-gap:5px}
  #fmtMenu .fmt-details .mi{min-width:0;padding:6px 7px}
  #fmtMenu .fmt-details .lbl{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #fmtMenu .fmt-empty{padding:16px 8px;color:var(--muted);font-size:12px;text-align:center}
  #fmtMenu .fmt-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 14px 10px;border-top:1px solid var(--border)}
  #fmtMenu .fmt-footer .mlink{font-size:11px}
  .seg{display:inline-flex;border:1px solid var(--border);border-radius:6px;overflow:hidden}
  .seg button{border:none;background:transparent;color:var(--muted);font-size:11px;padding:4px 9px;cursor:pointer}
  .seg button.on{background:var(--card2);color:var(--txt)}
  .skel{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;height:214px;position:relative}
  .skel::after{content:"";position:absolute;inset:0;background:linear-gradient(100deg,transparent 30%,color-mix(in srgb,var(--txt) 5%,transparent) 50%,transparent 70%);background-size:200% 100%;animation:skshine 1.4s linear infinite}
  @keyframes skshine{from{background-position:200% 0}to{background-position:-200% 0}}
  @media (prefers-reduced-motion:reduce){.skel::after{animation:none}}
  .brand .logo{color:var(--txt);align-self:center;display:block}
  .brand .wm{font-size:15px;font-weight:600;letter-spacing:-.01em}
  .brand .proj{font-size:12px;color:var(--muted);font-family:var(--code-font)}
  .brand .stat{display:none}
  .controls{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  /* mode embarqué (iframe Atelier) : header compact sur une rangée —
     la marque/projet/stat sont déjà dans le chrome de l'app */
  html.emb .brand{display:none}
  html.emb header{padding:6px 10px}
  html.emb .controls .ctrl-sp{flex:1}
  input[type=search]{flex:1;min-width:190px;padding:0 12px;border-radius:6px;border:1px solid var(--border);
        background:var(--bg);color:var(--txt);font-size:13px;height:30px}
  input[type=search]:focus{outline:none;border-color:var(--accent)}
  input[type=search].collapsed{display:block} /* recherche toujours visible (design pass) */
  #searchChip.on{border-color:var(--accent);color:var(--accent)}
  select,button{padding:0 11px;border-radius:6px;border:1px solid var(--border);background:var(--card);
        color:var(--txt);font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;height:30px;line-height:1.2}
  select:hover,button:hover{border-color:var(--border-strong)}
  select:focus-visible,button:focus-visible,.chip:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
  #sort{max-width:180px;color:var(--muted)}
  #folder{max-width:150px;color:var(--muted)}   /* keep it compact; long folder paths would otherwise stretch it to its own line */
  .chip{display:inline-flex;align-items:center;gap:5px;padding:0 11px;border-radius:6px;
        border:1px solid var(--border);background:var(--card);cursor:pointer;user-select:none;
        font-size:12px;font-weight:500;height:30px}
  .chip:hover{border-color:var(--border-strong)}
  .chip.off{opacity:.45}
  #sort,#folder{flex:0 1 auto;min-width:90px}
  #rescan{width:32px;padding:0;display:inline-flex;align-items:center;justify-content:center;
        color:var(--muted)}
  #rescan:hover{color:var(--txt)}
  #rescan svg{display:block}
  #rescan.spinning svg{animation:rescan-spin .9s linear infinite;color:var(--accent)}
  @keyframes rescan-spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){#rescan.spinning svg{animation:none;opacity:.5}}
  .menu{position:fixed;z-index:60;display:none;flex-direction:column;gap:2px;
        background:var(--card);border:1px solid var(--border);border-radius:10px;padding:7px;min-width:min(200px,calc(100vw - 16px));max-width:min(360px,calc(100vw - 16px));
        max-height:62vh;overflow:auto;box-shadow:0 8px 28px rgba(0,0,0,.5)}
  .menu .trow{cursor:pointer}
  .menu .tck{color:var(--accent)}
  .menu .mhd{font-size:11px;color:var(--muted);padding:3px 6px 5px}
  .menu .mi{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:5px 7px;border-radius:6px;font-size:13px}
  .menu .mi:hover{background:rgba(255,255,255,.05)}
  .menu .mi.on{color:var(--accent)}
  .menu .mi.muted,.menu .mi.muted:hover{color:var(--muted);background:none}
  .menu .mi.clr{color:#ff9b9b}
  .menu .lbl{cursor:pointer;flex:1;word-break:break-all}
  .menu .lbl.mono{font-family:var(--code-font);font-size:12px}
  .menu .ct{color:var(--muted);font-size:11px}
  .menu .x{cursor:pointer;color:#ff6b6b;padding:0 3px;flex-shrink:0}
  .menu .madd{display:flex;gap:5px;margin-top:5px;padding-top:6px;border-top:1px solid var(--border)}
  .menu .madd input{flex:1;min-width:0;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--txt);padding:5px 7px;font-size:12px}
  .menu .madd button{padding:5px 10px}
  .menu input[type=checkbox]{accent-color:var(--accent);margin-right:6px;vertical-align:-1px}
  .menu .mhd.sep{border-top:1px solid var(--border);margin-top:4px;padding-top:7px}
  .menu label.lbl{display:flex;align-items:center}
  .code-theme-grid{display:grid;gap:5px;padding:0 1px 2px}
  .code-theme-option{height:auto;min-height:54px;width:100%;display:grid;grid-template-columns:92px minmax(0,1fr) 16px;
        align-items:center;gap:8px;padding:6px;background:transparent;border:1px solid transparent;border-radius:7px;text-align:left}
  .code-theme-option:hover{background:rgba(255,255,255,.035);border-color:var(--border)}
  .code-theme-option:active{transform:scale(.98)}
  .code-theme-option.on{background:rgba(255,255,255,.04);border-color:var(--border-strong)}
  .code-theme-name{font-size:11px;color:var(--txt);line-height:1.25}
  .code-theme-preview{display:block;min-width:0;overflow:hidden;padding:5px 7px;border-radius:5px;background:var(--code-bg);
        color:var(--code-fg);font:9px/1.35 var(--code-font);white-space:pre;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)}
  .code-theme-check{color:var(--accent);font-size:12px;text-align:center}
  .tok-keyword{color:var(--code-keyword)} .tok-function{color:var(--code-function)}
  .tok-string{color:var(--code-string)} .tok-number{color:var(--code-number)}
  .tok-comment{color:var(--code-comment);font-style:italic} .tok-type{color:var(--code-type)}
  .tok-operator{color:var(--code-operator)} .tok-property{color:var(--code-property)}
  .tok-invalid{color:#ff6b6b;text-decoration:underline wavy}
  .playbtn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3;
        width:48px;height:48px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;
        display:flex;align-items:center;justify-content:center;font-size:18px;padding-left:3px;
        pointer-events:none;border:2px solid rgba(255,255,255,.9)}
  .menu .only{cursor:pointer;color:var(--muted);font-size:11px;flex-shrink:0;padding:0 3px}
  .menu .only:hover{color:var(--accent)}
  .menu .mlink{cursor:pointer;color:var(--muted);font-size:12px}
  .menu .mlink:hover{color:var(--accent)}
  .count{color:var(--muted);font-size:12px;margin-left:auto}
  main{padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--card-min,185px),1fr));gap:16px}
  /* panneau étroit : cartes plus compactes, jamais une seule colonne géante */
  @media (max-width:520px){ main{padding:12px;gap:12px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr))} }
  @media (max-width:340px){ main{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))} .thumb,.ph,.snip{height:110px} }
  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;
        display:flex;flex-direction:column;transition:border-color .12s,box-shadow .12s}
  .card:hover{border-color:var(--border-strong);box-shadow:var(--shadow)}
  .thumb{height:var(--thumb-h,150px);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .thumb img{max-width:100%;max-height:100%;object-fit:contain}
  .ph{height:var(--thumb-h,150px);display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:var(--card2);color:var(--muted);gap:6px}
  .ph .ext{font-size:30px;font-weight:600;letter-spacing:1px}
  .snip{height:var(--thumb-h,150px);overflow:hidden;background:var(--card2);padding:9px 11px;
        font-family:var(--code-font);font-size:10px;
        line-height:1.4;color:var(--code-fg);background:var(--code-bg);white-space:pre;tab-size:2;
        -webkit-mask-image:linear-gradient(#000 72%,transparent);mask-image:linear-gradient(#000 72%,transparent)}
  .meta{padding:9px 11px 10px;display:flex;flex-direction:column;gap:3px;flex:1}
  .nm{font-size:13px;font-weight:600;letter-spacing:-.005em;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fld{font-size:11px;color:var(--muted);word-break:break-all}
  .row2{display:flex;gap:7px;align-items:center;font-size:11px;color:var(--muted);min-width:0;margin-top:auto}
  .row2 .mf{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--code-font);font-size:11px}
  .row2 .md{flex:none;color:var(--faint);font-variant-numeric:tabular-nums}
  .row2 .fv,.row2 .rt{color:#c79a3b;flex:none}
  .row{display:flex;gap:8px;align-items:center;font-size:11px;color:var(--muted);margin-top:auto}
  .tag{padding:2px 7px;border-radius:6px;background:var(--card2);font-size:10px;text-transform:uppercase}
  .tag.archive{background:var(--arch);color:#d9a441}
  .tag.hid{background:#3a3a44;color:#aab}
  .card.hid{opacity:.5}
  .card.hid:hover{opacity:1}
  /* actions au survol : bandeau sur la zone MÉTA (jamais par-dessus la figure) */
  .hov{position:absolute;bottom:0;left:0;right:0;z-index:4;display:none;gap:3px;
       padding:7px 8px;background:var(--card);border-top:1px solid var(--border);
       align-items:center;justify-content:flex-start;flex-wrap:nowrap;overflow:hidden}
  .card:hover .hov{display:flex}
  .hov button{height:26px;min-width:26px;padding:0 8px;font-size:11px;line-height:1;cursor:pointer;
        background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--muted);box-shadow:var(--shadow)}
  .hov button:hover{color:var(--txt);border-color:var(--border-strong)}
  .hov button.on{color:#c79a3b;border-color:#c79a3b}
  .selbox{position:absolute;top:6px;left:6px;z-index:4;font-size:15px;cursor:pointer;line-height:1;
        background:rgba(15,17,21,.85);border:1px solid var(--border);border-radius:6px;padding:4px 7px;user-select:none;color:var(--txt);
        opacity:0}
  .card:hover .selbox,.selbox.on{opacity:1}
  .selbox.on{color:#ff6b6b;border-color:#ff6b6b}
  .star{position:absolute;top:6px;right:6px;font-size:18px;cursor:pointer;line-height:1;
        background:rgba(15,17,21,.85);border:1px solid var(--border);border-radius:50%;padding:5px 6px;user-select:none;color:var(--txt)}
  .star.on{color:#ffce3a;border-color:#ffce3a}
  .rate{display:flex;gap:2px;font-size:13px;line-height:1;user-select:none}
  .rate span{cursor:pointer;color:var(--border)}
  .rate span.on{color:#d9a441}
  .rate span:hover{color:#e8c26a}
  .card{position:relative}
  .empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:60px}
  #lb{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.88);display:none;
      flex-direction:column;align-items:center;justify-content:center;cursor:zoom-out}
  #lb.show{display:flex}
  #lb img{max-width:94vw;max-height:86vh;object-fit:contain;background:#fff;border-radius:6px;cursor:zoom-in}
  #lb.fs{background:#000;cursor:none;padding:0}
  #lb.fs #lbWrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;height:100%;min-height:0}
  /* Fill the viewport in BOTH true native fullscreen (cmux/browsers) AND CSS
     pane-fill (Orca) — object-fit:contain keeps aspect ratio (no distortion).
     High-res figures scale down sharply; low-res ones fill but soften (the
     trade-off for "take the whole screen"). */
  #lb.fs img{max-width:100vw;max-height:100vh;width:100vw;height:100vh;object-fit:contain;border-radius:0;background:#000;box-shadow:none;cursor:none}
  #lb.fs #lbCap,#lb.fs .lbBtn,#lb.fs #lbClose,#lb.fs #annotBar,#lb.fs #annotNote,#lb.fs #annotPill{display:none!important}
  #lb.fs #lbFs{opacity:0;pointer-events:none;color:rgba(255,255,255,.75);
      background:rgba(0,0,0,.5);border-radius:10px;width:40px;height:40px;top:8px;right:8px}
  #lb.fs.fs-ui,#lb.fs.fs-ui img{cursor:default}

(function(){
  try{ var m=(location.hash||'').match(/atelier_nonce=([\w-]+)/); if(m) sessionStorage.setItem('atelier_nonce', m[1]); }catch(e){}
  /* nonce IPC : inclus dans chaque message vers l'app hôte ; l'app rejette sans lui */

    sel.style.display='none';

    let menu=null;

function truncMid(name,max){
  if(name.length<=max) return name;
  const dot=name.lastIndexOf('.');
  const ext=dot>0?name.slice(dot):'';
  const stem=dot>0?name.slice(0,dot):name;
  const keep=max-ext.length-1;
  return stem.slice(0,Math.ceil(keep*0.6))+'…'+stem.slice(-Math.floor(keep*0.4))+ext;
}

const _ruleRe = {};
function ruleToRe(g){                                  // gitignore-ish glob -> RegExp
  if(_ruleRe[g]) return _ruleRe[g];
  const onBase = !g.includes('/');                     // no slash -> match basename at any depth
  let s = g.replace(/[.+^${}()|[\]\\]/g,'\\$&')   // escape regex specials, keep * ? for glob
           .replace(/\*\*/g,'@@D@@').replace(/\*/g,'[^/]*').replace(/\?/g,'[^/]')
           .replace(/@@D@@\//g,'(?:.*/)?').replace(/@@D@@/g,'.*');
  const o = {re:new RegExp('^'+s+'$'), onBase}; _ruleRe[g]=o; return o;
}
function matchesRule(rel){
  if(!hideRules.length) return false;
  const base = rel.slice(rel.lastIndexOf('/')+1);
  return hideRules.some(g=>{ const o=ruleToRe(g); return o.re.test(o.onBase?base:rel); });
}

    const m = document.getElementById('confirmModal');
    document.getElementById('confirmMsg').textContent = msg;
    const ok = document.getElementById('confirmOk'), cancel = document.getElementById('confirmCancel');
    ok.textContent = okLabel || 'Delete';
    m.classList.add('show');
    function onKey(ev){ if(ev.key==='Escape'){ev.stopPropagation();done(false);} else if(ev.key==='Enter'){ev.stopPropagation();done(true);} }
    function done(v){ m.classList.remove('show'); ok.onclick = cancel.onclick = m.onclick = null; document.removeEventListener('keydown', onKey, true); resolve(v); }
    ok.onclick = () => done(true);

    m.onclick = e => { if(e.target.id === 'confirmModal') done(false); };
    document.addEventListener('keydown', onKey, true);

function findScript(rel){

  const stem = rel.split('/').pop().replace(/\.[^.]+$/,'');
  const hit = FILES.find(f=>codeExt(f.ext) && f.rel.split('/').pop().replace(/\.[^.]+$/,'')===stem);
  if(hit){ lbOpenAny(hit.rel); return; }
  fetch((window.AtelierRuntime&&AtelierRuntime.api)?AtelierRuntime.api('/findscript?stem='):'/findscript?stem='+encodeURIComponent(stem)).then(r=>r.json()).then(j=>{
    if(j && j.script){ if(!lbOpenAny(j.script)) window.open('/'+j.script.split('/').map(encodeURIComponent).join('/'),'_blank'); }

function lbNativeFsAllowed(){

    try{ return JSON.parse(localStorage.getItem('claudeTargetV1')||'null'); }catch(e){ return null; }
  }
  (function(){
    const btn=document.getElementById('annotPillTarget'), menu=document.getElementById('tgMenu');
    if(ANNOT_EMBEDDED)btn.style.display='none';
    const mark=()=>btn.classList.toggle('set', !!claudeTarget());
    mark();
    btn.onclick=async e=>{
      e.stopPropagation();
      const cur=claudeTarget();
      let html='<div class="hd">Envoyer vers</div>'
        +'<div class="it'+(cur?'':' on')+'" data-i="-1"><span class="app">auto</span><span class="t">Session du projet (auto)</span></div>';
      try{
        const j=await (await fetch((window.AtelierRuntime&&AtelierRuntime.api)?AtelierRuntime.api('/claude-targets'):'/claude-targets')).json();
        (j.targets||[]).forEach((t,i)=>{
          const on=cur&&cur.app===t.app&&cur.id===t.id;
          html+='<div class="it'+(on?' on':'')+'" data-i="'+i+'"><span class="app">'+t.app+'</span><span class="t">'
            +esc(t.title||t.id)+(t.inProject?'':' — '+esc(String(t.cwd||'').split('/').pop()))+'</span></div>';
        });
        menu.innerHTML=html;
        const r=btn.getBoundingClientRect();
        menu.style.display='flex';
        menu.style.left=Math.max(8, r.left-120)+'px';
        menu.style.top=Math.max(8, r.top-menu.offsetHeight-10)+'px';
        menu.querySelectorAll('.it').forEach(it=>{
          it.onclick=ev=>{
            ev.stopPropagation();
            const i=+it.dataset.i;
            if(i<0) localStorage.removeItem('claudeTargetV1');
            else localStorage.setItem('claudeTargetV1', JSON.stringify({app:j.targets[i].app,id:j.targets[i].id,title:j.targets[i].title}));
            mark(); menu.style.display='none';
          };
        });
        document.addEventListener('click',function h(){menu.style.display='none';document.removeEventListener('click',h);});
      }catch(err){ console.warn('claude-targets failed', err); }
    };
  })();
  document.getElementById('annotPillSend').onclick=async function(){
    const lbl=document.getElementById('annotPillN');
    this.textContent='⏳';
    try{
      const j=await annotPost(true);
      annotSent=true;
      this.textContent='✓';
      lbl.textContent=(j.agentHost==='codex'&&j.queuedForAgent)
        ?'Envoyé à Codex ✓'
        :(ANNOT_EMBEDDED?'Added to chat ✓':(j.submitted?'Sent to session ✓':'Pasted into Claude ✓'));
    }catch(e){
      this.textContent='!';
      lbl.textContent='Serveur off — démarrer le serveur';
    }
    setTimeout(()=>{this.textContent='↑'; annotPillUpdate();},2400);
  };
}

// --- live reload: auto-refresh when the gallery is rebuilt (Claude edits + rescans),
//     never interrupting an open viewer/lightbox or an active text selection ---
(function(){
  let boot = null;
  const getRev = () => fetch((window.AtelierRuntime&&AtelierRuntime.api)?AtelierRuntime.api('/rev'):'/rev').then(r => r.json()).then(j => j.rev).catch(() => null);
  getRev().then(r => { boot = r; });

  /* --- fil d'événements Claude (Claude Code desktop) --- */
  let evLast = 0, evBoot = true;
  const toasts = document.createElement('div'); toasts.id='claudeToasts'; document.body.appendChild(toasts);
  function claudeToast(ev){
    const t = document.createElement('div'); t.className='claude-toast';
    const nm = document.createElement('span'); nm.className='nm'; nm.textContent = ev.row ? ev.row.name : ev.rel;
    const bx = document.createElement('div'); bx.appendChild(nm);
    if(ev.note){ const nt=document.createElement('div'); nt.className='nt'; nt.textContent=ev.note; bx.appendChild(nt); }
    const ic = document.createElement('span'); ic.className='ic'; ic.textContent='\u2726';
    t.appendChild(ic); t.appendChild(bx);
    t.onclick = () => { flashCard(ev.rel, true); t.remove(); };
    toasts.appendChild(t);
    setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .4s'; setTimeout(()=>t.remove(), 450); }, 9000);
  }
  function flashCard(rel, scroll){
    const el = [...document.querySelectorAll('#grid [data-act="lb"],#grid [data-act="open"],#grid [data-act="sel"]')]
      .find(e => e.dataset.rel === rel);
    const card = el && el.closest('.card');
    if(!card) return;
    if(scroll) card.scrollIntoView({behavior:'smooth', block:'center'});
    card.classList.add('claude-flash');
    setTimeout(()=>card.classList.add('fade'), 5000);
    setTimeout(()=>card.classList.remove('claude-flash','fade'), 6500);
  }
  async function pollClaudeEvents(){
    try{
      const j = await fetch((window.AtelierRuntime&&AtelierRuntime.api)?AtelierRuntime.api('/agent-events?since='):'/agent-events?since='+evLast, {cache:'no-store'}).then(r=>r.json());
      if(evBoot){ evLast = j.last || 0; evBoot = false; return; }   // ignore l'historique d'avant l'ouverture
      if(!j.events || !j.events.length){ evLast = j.last || evLast; return; }
      evLast = j.last;
      for(const ev of j.events){
        const i = FILES.findIndex(f => f.rel === ev.rel);
        if(i >= 0 && ev.row) Object.assign(FILES[i], {mtime:ev.row.mtime, mdate:ev.row.mdate, size:ev.row.size});
        else if(ev.row){ ev.row.folder = ev.row.folder || '.'; FILES.unshift(ev.row);
                         if(!FOLDERS.includes(ev.row.folder)){ FOLDERS.push(ev.row.folder); FOLDERS.sort(); } }
        claudeToast(ev);
      }
      render();                                   // tri mtime => la carte mise à jour remonte d'elle-même
      requestAnimationFrame(()=>{ for(const ev of j.events) flashCard(ev.rel, false); });
    }catch(e){}
  }
  pollClaudeEvents(); setInterval(pollClaudeEvents, 3000);

  setInterval(async () => {
    if(boot == null){ boot = await getRev(); return; }
    const lb = document.getElementById('lb');
    if(lb && lb.classList.contains('show')) return;        // a viewer/lightbox is open
    const sel = window.getSelection && window.getSelection();
    if(sel && String(sel).trim()) return;                  // user is selecting text
    const r = await getRev();
    if(r != null && r !== boot) location.reload();
  }, 2500);
})();
