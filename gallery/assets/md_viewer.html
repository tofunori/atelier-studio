<!DOCTYPE html>
<html lang="en">
<head>
<script src="/.fig_thumbs/atelier_theme.js"></script>
<meta charset="utf-8">
<title>Markdown</title>
<script src="/.fig_thumbs/studio_runtime.bundle.js"></script>
<script>AtelierStudioRuntime.bootstrap({tokenFetch:true,legacyTheme:"blue"});</script>
<script src="/.fig_thumbs/studio_core.bundle.js"></script>
<script src="marked.min.js"></script>
<script src="purify.min.js"></script>
<link rel="stylesheet" href="/.fig_thumbs/cm/codemirror.min.css">
<link rel="stylesheet" href="/.fig_thumbs/cm/material-darker.min.css">
<script src="/.fig_thumbs/cm/codemirror.min.js"></script>
<script src="/.fig_thumbs/cm/mark-selection.min.js"></script>
<script src="/.fig_thumbs/cm/markdown.min.js"></script>
<script src="/.fig_thumbs/cm6/studio_cm6.bundle.js"></script>
<script src="/.fig_thumbs/editor_factory.js"></script>
<script src="/.fig_thumbs/studio_surfaces.bundle.js"></script>
<link rel="stylesheet" href="/.fig_thumbs/md_viewer.css">
</head>
<body>
<header>
  <b id="fname"></b>
  <div class="seg">
    <button id="mPrev" class="on">Preview</button>
    <button id="mSplit">Side by side</button>
    <button id="mEdit">Edit</button>
  </div>
  <button id="annotBtn" title="Dessiner des annotations sur le document rendu">✎ Annoter</button>
  <span id="state"></span>
  <span id="hint">Cmd+S: save · selection visible to Claude</span>
  <button id="clearSel" title="Clear the selection (Esc)">✕ clear</button>
</header>
<div id="body">
  <div id="edPane"></div>
  <div id="prevPane" class="show"><div id="wrap">Loading…</div></div>
</div>
<script>AtelierStudioSurfaces.bootstrapMarkdownSurface({editorFactory:AtelierEditorFactory,parser:marked,sanitizer:DOMPurify});</script>
</body>
</html>
