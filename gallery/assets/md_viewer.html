<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Markdown</title>
<script src="marked.min.js"></script>
<script src="purify.min.js"></script>
<link rel="stylesheet" href="/.fig_thumbs/cm/codemirror.min.css">
<link rel="stylesheet" href="/.fig_thumbs/cm/material-darker.min.css">
<script src="/.fig_thumbs/cm/codemirror.min.js"></script>
<script src="/.fig_thumbs/cm/mark-selection.min.js"></script>
<script src="/.fig_thumbs/cm/markdown.min.js"></script>
<style>
:root{--ui-font:-apple-system,'SF Pro Text','Inter Variable',sans-serif;--code-font:ui-monospace,'SF Mono',Menlo,monospace;--bg:#202024;--card:#27272a;--card2:#1f1f23;--txt:#dbdfe5;--muted:#a1a1aa;--accent:#5b9dff;--border:#3f3f46}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
       font-family:var(--ui-font);
       font-size:15px;line-height:1.6;display:flex;flex-direction:column}
  header{background:var(--card);border-bottom:1px solid var(--border);padding:7px 14px;
         display:flex;gap:10px;align-items:center;font-size:13px;flex-shrink:0}
  #fname{font-weight:600}
  header .seg{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;flex-shrink:0}
  header .seg button{background:transparent;border:none;border-right:1px solid var(--border);
         color:var(--muted);padding:0 12px;height:24px;line-height:24px;font-size:12px;
         white-space:nowrap;cursor:pointer;transition:background .12s,color .12s}
  header .seg button:last-child{border-right:none}
  header .seg button:hover{color:var(--txt)}
  header .seg button.on{background:var(--border);color:var(--txt)}
  #state{color:var(--muted);margin-left:4px}
  #state.dirty{color:#ffd54a}
  #state.saved{color:#7ec97e}
  #state.conflict{color:#ff6b6b}
  #hint{margin-left:auto;color:var(--muted);font-size:12px}
  #clearSel{display:none;background:transparent;border:1px solid var(--border);color:var(--muted);
            border-radius:6px;height:22px;padding:0 9px;font-size:11px;cursor:pointer;flex-shrink:0}
  #clearSel.show{display:inline-block}
  #clearSel:hover{color:var(--txt);border-color:var(--accent)}
  #body{flex:1;display:flex;min-height:0}
  #edPane{flex:1;min-width:0;display:none;flex-direction:column;border-right:1px solid var(--border)}
  #edPane.show{display:flex}
  .CodeMirror{flex:1;height:auto;font-size:13px;font-family:var(--code-font);line-height:1.55}
  .CodeMirror .CodeMirror-selected{background:transparent !important}
  .CodeMirror-focused .CodeMirror-selected{background:transparent !important}
  .CodeMirror-selectedtext{background:rgba(91,157,255,.45) !important;border-radius:2px}
  .cm-clsel{background:rgba(91,157,255,.28);border-radius:2px}
  #prevPane{flex:1;min-width:0;overflow-y:auto;display:none;position:relative}
  #prevPane.show{display:block}
  #wrap{max-width:860px;margin:0 auto;padding:24px 36px 60px}
  h1,h2,h3{line-height:1.3;border-bottom:1px solid var(--border);padding-bottom:6px}
  a{color:var(--accent)}
  code{background:var(--card2);padding:2px 5px;border-radius:6px;font-size:13px}
  pre{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px;overflow-x:auto}
  pre code{background:none;padding:0}
  table{border-collapse:collapse;margin:14px 0;display:block;overflow-x:auto}
  th,td{border:1px solid var(--border);padding:6px 12px}
  th{background:var(--card)}
  blockquote{margin:0;padding:2px 16px;border-left:3px solid var(--accent);color:var(--muted)}
  img{max-width:100%}
  hr{border:none;border-top:1px solid var(--border)}
  #err{color:#ff6b6b;padding:40px;text-align:center}
  #annotBtn{background:transparent;border:1px solid var(--border);color:var(--muted);
            border-radius:6px;height:24px;padding:0 10px;font-size:12px;cursor:pointer;
            flex-shrink:0;transition:background .12s,color .12s}
  #annotBtn:hover{color:var(--txt);border-color:var(--accent)}
  #annotBtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
  #annotOverlay{position:absolute;left:0;top:0;z-index:5;pointer-events:none;background:transparent}

  /* ===== thème code « atelier » (surcharge material-darker) ===== */
  .cm-s-material-darker.CodeMirror{background:#1e2126;color:#d8d3c8}
  .cm-s-material-darker .cm-keyword{color:#e8823a}
  .cm-s-material-darker .cm-def{color:#d8d3c8}
  .cm-s-material-darker .cm-variable{color:#d8d3c8}
  .cm-s-material-darker .cm-variable-2{color:#c9c3b6}
  .cm-s-material-darker .cm-property{color:#c9c3b6}
  .cm-s-material-darker .cm-string{color:#5fb0a5}
  .cm-s-material-darker .cm-string-2{color:#5fb0a5}
  .cm-s-material-darker .cm-number{color:#5fb0a5}
  .cm-s-material-darker .cm-atom{color:#5fb0a5}
  .cm-s-material-darker .cm-builtin{color:#7fbcb2}
  .cm-s-material-darker .cm-operator{color:#9a958a}
  .cm-s-material-darker .cm-comment{color:#868d9a;font-style:italic}
  .cm-s-material-darker .cm-meta{color:#9a958a}
  .cm-s-material-darker .cm-qualifier{color:#7fbcb2}
</style>
<script>(function(){var T={'Default':{bg:'#202024',card:'#27272a',card2:'#1f1f23',txt:'#dbdfe5',muted:'#a1a1aa',accent:'#5b9dff',border:'#3f3f46'},'Codex One':{bg:'#202024',card:'#2f343f',card2:'#21252b',txt:'#abb2bf',muted:'#7f848e',accent:'#4d78cc',border:'#3e4451'},'Dracula':{bg:'#282a36',card:'#343746',card2:'#21222c',txt:'#f8f8f2',muted:'#9aa0b3',accent:'#bd93f9',border:'#44475a'},'Nord':{bg:'#2e3440',card:'#3b4252',card2:'#272c36',txt:'#e5e9f0',muted:'#9aa3b2',accent:'#88c0d0',border:'#434c5e'}};var t;try{t=T[localStorage.getItem('figTheme')];}catch(e){}t=t||T['Default'];var r=document.documentElement.style;for(var k in t)r.setProperty('--'+k,t[k]);})();</script>
</head>
<body>
<header>
  <b id="fname"></b>
  <div class="seg">
    <button id="mPrev" class="on">Preview</button>
    <button id="mSplit">Side by side</button>
    <button id="mEdit">Edit</button>
  </div>
  <button id="annotBtn" title="Dessiner des annotations sur le document rendu">✎ Annoter</button>
  <span id="state"></span>
  <span id="hint">Cmd+S: save · selection visible to Claude</span>
  <button id="clearSel" title="Clear the selection (Esc)">✕ clear</button>
</header>
<div id="body">
  <div id="edPane"></div>
  <div id="prevPane" class="show"><div id="wrap">Loading…</div></div>
</div>
<script>
const params = new URLSearchParams(location.search);
// path = absolute path (for /code + /codesave); file = relative path (for <base> images)
const path = params.get("path");
const file = params.get("file") || "";
const wrap = document.getElementById("wrap");
const stateEl = document.getElementById("state");
const fname = path ? path.split("/").pop() : (file.split("/").pop() || "(markdown)");
document.getElementById("fname").textContent = fname;
document.title = fname;

// base pour que les images relatives du markdown se resolvent contre le serveur statique du projet
if(file){
  const dir = file.split("/").slice(0,-1).join("/");
  const b = document.createElement("base");
  b.href = "/" + (dir ? dir.split("/").map(encodeURIComponent).join("/") + "/" : "");
  document.head.appendChild(b);
}

let cm = null, diskMtime = 0, dirty = false, loaded = false, srcText = "";
function setState(cls, txt){ stateEl.className = cls; stateEl.textContent = txt; }
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function renderPreview(text){ srcText = text || ""; wrap.innerHTML = DOMPurify.sanitize(marked.parse(srcText)); }

// --- chargement via /code (text + mtime) ; repli lecture seule via fetch brut ---
async function load(){
  if(!path){
    try{
      const r = await fetch("/" + file.split("/").map(encodeURIComponent).join("/"));
      if(!r.ok) throw new Error(r.status);
      renderPreview(await r.text());
    }catch(e){ wrap.innerHTML = '<div id="err">Unable to load ' + esc(file) + ' (' + esc(e.message) + ')</div>'; }
    return;
  }
  try{
    const r = await fetch("/code?path=" + encodeURIComponent(path));
    const j = await r.json();
    if(j.error){ wrap.innerHTML = '<div id="err">' + esc(j.error) + '</div>'; return; }
    diskMtime = j.mtime;
    renderPreview(j.text);
    if(cm){ const cur = cm.getCursor(); cm.setValue(j.text); cm.setCursor(cur); }
    loaded = true; dirty = false; setState("saved", "saved");
  }catch(e){ wrap.innerHTML = '<div id="err">Server off — ' + esc(e.message) + '</div>'; }
}

function initEditor(text){
  if(cm) return;
  cm = CodeMirror(document.getElementById("edPane"), {
    value: text != null ? text : "", mode: "markdown", theme: "material-darker",
    lineNumbers: true, lineWrapping: true, viewportMargin: 50, styleSelectedText: true
  });
  cm.on("change", (_, ch) => {
    renderPreview(cm.getValue());
    if(ch.origin !== "setValue"){ dirty = true; setState("dirty", "modified"); }
  });
  let selT = null;
  cm.on("cursorActivity", () => {
    clearTimeout(selT);
    selT = setTimeout(() => {
      const sel = cm.getSelection();
      if(sel && sel.trim() && path){
        const f = cm.getCursor("from"), t = cm.getCursor("to");
        if(window._clMark) window._clMark.clear();
        window._clMark = cm.markText(f, t, {className: "cm-clsel"});
        fetch("/selinfo", {method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({
            lines: t.line - f.line + 1, words: sel.trim().split(/\s+/).length,
            text: sel, rel: file || path, name: fname, page: "L" + (f.line+1) + "-" + (t.line+1)
          })}).catch(()=>{});
        selActive(sel.trim().split(/\s+/).length);
      }
    }, 200);
  });
}

async function save(){
  if(!cm || !path) return;
  const r = await fetch("/codesave", {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({path, text: cm.getValue(), mtime: diskMtime})});
  const j = await r.json();
  if(j.error === "conflit"){
    setState("conflict", "conflict: the file changed on disk — reload or re-save to overwrite");
    diskMtime = j.mtime; return;
  }
  if(j.error){ setState("conflict", j.error); return; }
  diskMtime = j.mtime; dirty = false;
  setState("saved", "saved " + new Date().toLocaleTimeString());
}

// --- modes d'affichage ---
const edPane = document.getElementById("edPane"), prevPane = document.getElementById("prevPane");
const btns = {prev: document.getElementById("mPrev"), split: document.getElementById("mSplit"), edit: document.getElementById("mEdit")};
function setMode(m){
  if((m === "split" || m === "edit") && !path){ return; } // no absolute path -> no editing
  Object.values(btns).forEach(b => b.classList.remove("on"));
  btns[m].classList.add("on");
  edPane.classList.toggle("show", m === "split" || m === "edit");
  prevPane.classList.toggle("show", m === "prev" || m === "split");
  if(m === "split" || m === "edit"){
    if(!cm) initEditor(srcText);   // first pass: fill the editor with the loaded text
    setTimeout(() => cm && cm.refresh(), 0);
  }
  document.getElementById("hint").style.display = "";   // keep it visible in Preview too (selection works there)
}
btns.prev.onclick = () => setMode("prev");
btns.split.onclick = () => setMode("split");
btns.edit.onclick = () => setMode("edit");

document.addEventListener("keydown", e => {
  if((e.metaKey || e.ctrlKey) && e.key === "s"){ e.preventDefault(); save(); }
  if((e.metaKey || e.ctrlKey) && e.key === "e"){ e.preventDefault(); setMode(edPane.classList.contains("show") ? "prev" : "split"); }
  if(e.key === "Escape"){ clearSelection(); }
});

// auto-reload if the file changes on disk while the buffer is clean (Claude qui edite)
setInterval(async () => {
  if(dirty || !path) return;
  try{
    const r = await fetch("/code?path=" + encodeURIComponent(path));
    const j = await r.json();
    if(j.mtime && Math.abs(j.mtime - diskMtime) > 0.001){
      diskMtime = j.mtime; renderPreview(j.text);
      if(cm){ const cur = cm.getCursor(), sc = cm.getScrollInfo(); cm.setValue(j.text); cm.setCursor(cur); cm.scrollTo(sc.left, sc.top); }
      setState("saved", "reloaded (modified on disk) " + new Date().toLocaleTimeString());
    }
  }catch(e){}
}, 2000);

// --- text selected in the rendered Preview is visible to Claude (like the PDF / code viewers) ---
let _prevSelT = null;
const hintEl = document.getElementById("hint");
const clearBtn = document.getElementById("clearSel");
const HINT0 = hintEl.textContent;
function selActive(words){                // show the confirmation + the clear button (selection is live)
  hintEl.textContent = "✓ " + words + (words > 1 ? " words" : " word") + " selected → Claude";
  hintEl.style.color = "var(--accent)";
  clearBtn.classList.add("show");
}
function clearSelection(){                // cancel: drop the highlight + tell Claude there's no selection
  const s = window.getSelection && window.getSelection();
  if(s) s.removeAllRanges();
  if(window._clMark){ window._clMark.clear(); window._clMark = null; }
  fetch("/selinfo", {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({lines:0, words:0})}).catch(()=>{});   // server removes fig-selection.json
  hintEl.textContent = HINT0; hintEl.style.color = "";
  clearBtn.classList.remove("show");
}
clearBtn.onclick = clearSelection;
function pushPreviewSel(){
  clearTimeout(_prevSelT);
  _prevSelT = setTimeout(() => {
    const s = window.getSelection();
    if(!s || !s.anchorNode || !wrap.contains(s.anchorNode)) return;   // only the rendered preview
    const txt = s.toString();
    if(!txt.trim()) return;
    const words = txt.trim().split(/\s+/).length;
    fetch("/selinfo", {method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ lines: txt.split("\n").length, words: words,
        text: txt, rel: file || path, name: fname, page: "preview" })}).catch(()=>{});
    selActive(words);
  }, 200);
}
prevPane.addEventListener("mouseup", pushPreviewSel);
prevPane.addEventListener("keyup", pushPreviewSel);
document.addEventListener("selectionchange", pushPreviewSel);

// --- drawn annotations over the rendered markdown (shared AnnotKit) ---------
// /rasterize would render the RAW .md text, so instead we compose the rendered
// DOM into the export canvas via an SVG <foreignObject> data URL. Chrome taints
// a canvas as soon as a foreignObject is drawn onto it (security), so the
// realistic path is the clean fallback: a canvas filled with the page bg + a
// header line, carrying the strokes + numbered notes (whose text holds content).
const annotBtn = document.getElementById("annotBtn");
const relPath = file || path || fname;          // project-relative value, per ?file=
let annotOverlay = null, annotKit = null;

function cssVar(name, dflt){
  const v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  return v || dflt;
}
function ensureOverlay(){
  if(!annotOverlay){
    annotOverlay = document.createElement("canvas");
    annotOverlay.id = "annotOverlay";
    prevPane.appendChild(annotOverlay);          // absolute child scrolls with content
  }
  const w = Math.max(prevPane.scrollWidth, prevPane.clientWidth);
  const h = Math.min(20000, Math.max(prevPane.scrollHeight, prevPane.clientHeight));
  annotOverlay.width = w; annotOverlay.height = h;             // pixel space = CSS size (1:1)
  annotOverlay.style.width = w + "px"; annotOverlay.style.height = h + "px";
  if(annotKit && annotKit.enabled) annotKit.redraw();
}
function loadOutSvg(w, h){
  return new Promise((res, rej) => {
    let styles = "";
    document.querySelectorAll("style").forEach(s => { styles += s.textContent + "\n"; });
    const bg = cssVar("--bg", "#202024"), txt = cssVar("--txt", "#dbdfe5");
    const inner = '<div xmlns="http://www.w3.org/1999/xhtml" style="width:' + w
      + 'px;background:' + bg + ';color:' + txt + '"><style>' + styles + '</style>'
      + wrap.outerHTML + '</div>';
    const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '">'
      + '<foreignObject width="100%" height="100%">' + inner + '</foreignObject></svg>';
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = () => rej(new Error("svg compose failed"));
    img.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
  });
}
function annotHost(){
  return {
    overlay: annotOverlay,
    name: () => fname + "-annot",
    exportBase: async () => {
      const w = annotOverlay.width, h = annotOverlay.height;
      const bg = cssVar("--bg", "#202024"), txt = cssVar("--txt", "#dbdfe5");
      const comp = document.createElement("canvas"); comp.width = w; comp.height = h;
      const cx = comp.getContext("2d");
      cx.fillStyle = bg; cx.fillRect(0, 0, w, h);
      try{
        const img = await loadOutSvg(w, h);
        cx.drawImage(img, 0, 0, w, h);
        comp.toDataURL();                          // taint probe: throws if foreignObject tainted it
        return { src: comp, w, h };
      }catch(e){                                    // clean fallback: bg + header line, no composed DOM
        const fb = document.createElement("canvas"); fb.width = w; fb.height = h;
        const fx = fb.getContext("2d");
        fx.fillStyle = bg; fx.fillRect(0, 0, w, h);
        fx.fillStyle = txt; fx.font = "600 16px -apple-system,system-ui,sans-serif";
        fx.fillText("annotations sur " + fname, 20, 30);
        return { src: fb, w, h };
      }
    }
  };
}
function loadAnnotKit(){
  return new Promise((res, rej) => {
    if(window.AnnotKit) return res();
    const s = document.createElement("script");
    s.src = "/.fig_thumbs/annot_kit.js";
    s.onload = () => res(); s.onerror = () => rej(new Error("annot_kit load failed"));
    document.head.appendChild(s);
  });
}
annotBtn.addEventListener("click", () => {
  setMode("prev");                                 // annotate against the rendered preview
  loadAnnotKit().then(() => {
    if(!annotKit){ ensureOverlay(); annotKit = window.AnnotKit.create(annotHost()); }
    else ensureOverlay();
    const on = annotKit.toggle();
    annotBtn.classList.toggle("on", on);
  }).catch(() => { annotBtn.textContent = "✎ !"; setTimeout(() => annotBtn.textContent = "✎ Annoter", 1600); });
});
window.addEventListener("resize", () => { if(annotKit && annotKit.enabled) ensureOverlay(); });

load();
</script>
</body>
</html>
