<script>(function(){
  /* Jeton hors projet (Atelier Studio) : si l'app a ouvert cette page avec
     ?token=…, le propager à toutes les requêtes same-origin de la page —
     y compris celles de diff_versions.js. Sans jeton : comportement inchangé. */
  var tok = null;
  window.__tokq = ""; /* suffixe "&token=…" pour les URLs hors fetch (pdf.js) */
  try{ tok = new URLSearchParams(location.search).get("token"); }catch(e){}
  if(!tok) return;
  window.__tokq = "&token=" + encodeURIComponent(tok);
  var orig = window.fetch.bind(window);
  window.fetch = function(input, init){
    try{
      var u = new URL(typeof input === "string" ? input : input.url, location.href);
      if(u.origin === location.origin && !u.searchParams.has("token")){
        u.searchParams.set("token", tok);
        input = (typeof input === "string") ? (u.pathname + u.search) : new Request(u, input);
      }
    }catch(e){}
    return orig(input, init);
  };
})();</script>

<style>
:root{--ui-font:-apple-system,'SF Pro Text','Inter Variable',sans-serif;--code-font:ui-monospace,'SF Mono',Menlo,monospace;--bg:#202024;--card:#27272a;--card2:#1f1f23;--txt:#dbdfe5;--muted:#a1a1aa;--accent:#5b9dff;--border:#3f3f46}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
            font-family:var(--ui-font);display:flex;flex-direction:column}
  header{background:var(--card);border-bottom:1px solid var(--border);padding:8px 14px;
         display:flex;gap:12px;align-items:center;font-size:13px;flex-shrink:0}
  #fname{font-weight:600}
  #state{color:var(--muted)}
  #state.dirty{color:#ffd54a}
  #state.saved{color:#7ec97e}
  #state.conflict{color:#ff6b6b}
  .dvBtn{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:6px;
         padding:3px 8px;font-size:12px;cursor:pointer}
  .dvBtn:hover{color:var(--txt)}
  .dvBtn:disabled{cursor:default}
  #diffTag.on{background:var(--border);color:var(--txt)}
  /* état visible (le masquage initial est inline ; le module l'efface pour armer) */
  #diffGrp{display:inline-flex;align-items:center;gap:4px}
  .CodeMirror,.cm-editor{flex:1;height:auto;font-size:13px;
              font-family:var(--code-font);line-height:1.5}
  .cm-editor{background:#1e2126;color:#d8d3c8;min-height:0}
  .cm-editor .cm-scroller{font-family:var(--code-font);overflow:auto}
  .cm-editor .cm-gutters{background:transparent;border-right:1px solid #2a2f3a;color:#5b6270}
  /* breathing room between line numbers and code (esp. 3-digit lines) */
  .CodeMirror-linenumber{padding:0 14px 0 22px !important;color:#5b6270}
  .CodeMirror-gutters{background:transparent;border-right:1px solid #2a2f3a}
  .CodeMirror-lines{padding-left:4px}
  /* selection hugs the text (mark-selection) instead of filling the whole line */
  .CodeMirror .CodeMirror-selected{background:transparent !important}
  .CodeMirror-focused .CodeMirror-selected{background:transparent !important}
  .CodeMirror-selectedtext{background:rgba(91,157,255,.45) !important;box-shadow:none !important;border-radius:2px}
  /* last selection sent to Claude: persistent marker */
  .cm-clsel{background:rgba(91,157,255,.28);border-radius:2px}
  #picker{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;z-index:200;
          align-items:flex-start;justify-content:center;padding-top:8vh}
  #picker.show{display:flex}
  #pickerBox{background:var(--card);border:1px solid var(--border);border-radius:10px;width:520px;
             max-height:70vh;display:flex;flex-direction:column;overflow:hidden;
             box-shadow:0 8px 40px rgba(0,0,0,.6)}
  #pickerPath{padding:10px 14px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border);
              white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #pickerList{overflow-y:auto;flex:1}
  #pickerList div{padding:7px 14px;font-size:13px;cursor:pointer;display:flex;gap:8px}
  #pickerList div:hover{background:var(--border)}
  #pickerList .d{color:var(--accent)}

  /* ===== thème code « atelier » (surcharge material-darker) ===== */
  .cm-s-material-darker.CodeMirror{background:#1e2126;color:#d8d3c8}
  .cm-s-material-darker .cm-keyword{color:#e8823a}
  .cm-s-material-darker .cm-def{color:#d8d3c8}
  .cm-s-material-darker .cm-variable{color:#d8d3c8}
  .cm-s-material-darker .cm-variable-2{color:#c9c3b6}
  .cm-s-material-darker .cm-property{color:#c9c3b6}
  .cm-s-material-darker .cm-string{color:#5fb0a5}
  .cm-s-material-darker .cm-string-2{color:#5fb0a5}
  .cm-s-material-darker .cm-number{color:#5fb0a5}
  .cm-s-material-darker .cm-atom{color:#5fb0a5}
  .cm-s-material-darker .cm-builtin{color:#7fbcb2}
  .cm-s-material-darker .cm-operator{color:#9a958a}
  .cm-s-material-darker .cm-comment{color:#868d9a;font-style:italic}
  .cm-s-material-darker .cm-meta{color:#9a958a}
  .cm-s-material-darker .cm-qualifier{color:#7fbcb2}

  /* CSV data view: dense scientific table, same source buffer underneath. */
  #csvTools{display:none;align-items:center;gap:8px;margin-left:2px}
  #csvTools.show{display:flex}
  .csvMode{display:inline-flex;padding:2px;background:var(--card2);border:1px solid var(--border);border-radius:7px}
  .csvMode button{border:0;background:transparent;color:var(--muted);font:600 11px/1 var(--ui-font);
                  padding:5px 9px;border-radius:5px;cursor:pointer}
  .csvMode button[aria-pressed="true"]{background:var(--border);color:var(--txt)}
  #csvSearch{width:min(230px,24vw);border:1px solid var(--border);border-radius:6px;background:var(--card2);
             color:var(--txt);font:12px/1.2 var(--ui-font);padding:5px 9px;outline:none}
  #csvSearch:focus{border-color:var(--accent);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 22%,transparent)}
  #csvMeta{font:11px/1.2 var(--ui-font);color:var(--muted);white-space:nowrap}
  #csvView{display:none;flex:1;min-height:0;overflow:auto;background:var(--card2);position:relative}
  #csvView.show{display:block}
  #csvEmpty{display:none;padding:32px;color:var(--muted);font-size:13px}
  #csvTable{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;font:12px/1.4 var(--code-font);
            font-variant-numeric:tabular-nums;color:var(--txt)}
  #csvTable th,#csvTable td{height:30px;box-sizing:border-box;border-right:1px solid color-mix(in srgb,var(--border) 62%,transparent);
                           border-bottom:1px solid color-mix(in srgb,var(--border) 50%,transparent);padding:5px 10px;
                           max-width:420px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #csvTable thead th{position:sticky;top:0;z-index:3;background:color-mix(in srgb,var(--card) 96%,var(--accent) 4%);
                     color:var(--txt);font-family:var(--ui-font);font-size:11px;font-weight:650;text-align:left;
                     letter-spacing:.01em;cursor:pointer;box-shadow:0 1px 0 var(--border)}
  #csvTable thead th:hover{background:color-mix(in srgb,var(--card) 88%,var(--accent) 12%)}
  #csvTable .csvIndex{position:sticky;left:0;z-index:2;width:48px;min-width:48px;max-width:48px;text-align:right;
                      color:var(--muted);background:var(--card2);font-size:10px;font-weight:500;user-select:none}
  #csvTable thead .csvIndex{z-index:4;background:var(--card)}
  #csvTable tbody tr:nth-child(even) td:not(.csvIndex){background:color-mix(in srgb,var(--card2) 96%,var(--txt) 4%)}
  #csvTable tbody tr:hover td{background:color-mix(in srgb,var(--card2) 87%,var(--accent) 13%) !important}
  #csvTable td.csv-number{text-align:right;color:color-mix(in srgb,var(--txt) 82%,var(--accent) 18%)}
  #csvTable td.csv-path{color:var(--muted)}
  #csvTable td.csv-empty{color:color-mix(in srgb,var(--muted) 48%,transparent)}
  .csvBool{display:inline-flex;align-items:center;border-radius:4px;padding:1px 5px;font:650 10px/1.4 var(--ui-font);
           background:color-mix(in srgb,var(--muted) 14%,transparent);color:var(--muted)}
  .csvBool.true{background:color-mix(in srgb,#56b58c 18%,transparent);color:#78cfaa}
  .csvSwatch{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:7px;vertical-align:-1px;
             border:1px solid color-mix(in srgb,var(--txt) 26%,transparent);box-shadow:inset 0 0 0 1px rgba(0,0,0,.12)}
  .csvSort{margin-left:6px;color:var(--accent);font-size:9px}
  #csvMore{display:none;margin:12px auto 20px;border:1px solid var(--border);border-radius:6px;background:var(--card);
           color:var(--txt);padding:6px 12px;font:12px var(--ui-font);cursor:pointer}
  #csvMore:hover{border-color:var(--accent)}
</style>

<body>
<header>
  <b id="fname"></b>
  <button id="openFile" style="background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer">Open…</button>
  <select id="wrapSel" title="Word wrap" style="background:var(--card);color:var(--txt);border:1px solid var(--border);border-radius:6px;padding:3px 6px;font-size:12px;cursor:pointer">
    <option value="win">Wrap: window</option>
    <option value="off">Wrap: off</option>
    <option value="80">Wrap: 80</option>
    <option value="100">Wrap: 100</option>
    <option value="120">Wrap: 120</option>
    <option value="50">Wrap: 50</option>
    <option value="60">Wrap: 60</option>
    <option value="70">Wrap: 70</option>
    <option value="90">Wrap: 90</option>
    <option value="custom">Wrap: custom…</option>
  </select>
  <input id="wrapCustom" type="number" min="20" max="400" step="1" placeholder="cols" title="Wrap column"
         style="display:none;width:56px;background:var(--card);color:var(--txt);border:1px solid var(--border);border-radius:6px;padding:3px 6px;font-size:12px">
  <span id="diffGrp" style="display:none">
    <button id="diffPrev" class="dvBtn" style="display:none" title="Version précédente">&#8249;</button>
    <button id="diffTag" class="dvBtn" disabled style="opacity:.4" title="Historique des modifications — vide pour l’instant (⌘S ou une modif de l’agent crée une version)"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" style="vertical-align:-2px"><path d="M1.6 3.4h3M3.1 1.9v3M6.9 3.4h7.5M1.6 12.6h3M6.9 12.6h7.5"/><path d="M1.6 8h12.8" opacity=".35"/></svg></button>
    <button id="diffNext" class="dvBtn" style="display:none" title="Version suivante">&#8250;</button>
    <button id="diffRestore" class="dvBtn" style="display:none" title="Rétablir la version affichée sur le disque">Rétablir</button>
  </span>
  <span id="state"></span>
  <span id="csvTools">
    <span class="csvMode" aria-label="CSV view mode">
      <button id="csvTableBtn" type="button" aria-pressed="true">Tableau</button>
      <button id="csvSourceBtn" type="button" aria-pressed="false">Source</button>
    </span>
    <input id="csvSearch" type="search" aria-label="Rechercher dans le CSV" placeholder="Rechercher dans les lignes">
    <span id="csvMeta" aria-live="polite"></span>
  </span>
  <span style="margin-left:auto;color:var(--muted)">Cmd+S: save · selection visible to Claude</span>
</header>
<div id="ed" style="flex:1;display:flex;flex-direction:column;min-height:0;background:#212121"></div>
<div id="csvView" aria-label="CSV data table" tabindex="0">
  <div id="csvEmpty">Aucune donnée tabulaire à afficher.</div>
  <table id="csvTable"><thead></thead><tbody></tbody></table>
  <button id="csvMore" type="button">Afficher plus de lignes</button>
</div>
<div id="picker"><div id="pickerBox">
  <div id="pickerPath"></div>
  <div id="pickerList"></div>
</div></div>
<script>
const path = new URLSearchParams(location.search).get("path");
document.getElementById("fname").textContent = path ? path.split("/").pop() : "(no file)";
document.title = path ? path.split("/").pop() : "Editor";

const ext = path ? path.split(".").pop() : "";
let cm = null, diskMtime = 0, dirty = false;
const isCsv = ext.toLowerCase() === "csv";

const csvTools = document.getElementById("csvTools");
const csvView = document.getElementById("csvView");
const csvTable = document.getElementById("csvTable");
const csvEmpty = document.getElementById("csvEmpty");
const csvTableBtn = document.getElementById("csvTableBtn");
const csvSourceBtn = document.getElementById("csvSourceBtn");
const csvSearch = document.getElementById("csvSearch");
const csvMeta = document.getElementById("csvMeta");
const csvMore = document.getElementById("csvMore");
let csvMode = isCsv ? (localStorage.getItem("csvViewMode") || "table") : "source";
let csvParsed = null, csvSortColumn = -1, csvSortDirection = 0, csvVisibleRows = 750;

function csvCell(td, value){
  const kind = AtelierCsv.classify(value);
  td.className = "csv-" + kind;
  td.title = value;
  if(kind === "empty"){ td.textContent = "·"; return; }
  if(kind === "boolean"){
    const badge = document.createElement("span");
    badge.className = "csvBool " + (String(value).toLowerCase() === "true" ? "true" : "false");
    badge.textContent = String(value).toUpperCase(); td.appendChild(badge); return;
  }
  if(kind === "color"){
    const swatch = document.createElement("span"); swatch.className = "csvSwatch"; swatch.style.background = value;
    td.appendChild(swatch); td.appendChild(document.createTextNode(value)); return;
  }
  td.textContent = value;
}

function csvRowsForView(){
  if(!csvParsed || csvParsed.rows.length < 2) return [];
  const query = csvSearch.value.trim().toLocaleLowerCase();
  let rows = csvParsed.rows.slice(1).map((cells, index) => ({cells, index}));
  if(query) rows = rows.filter(row => row.cells.some(value => String(value).toLocaleLowerCase().includes(query)));
  if(csvSortDirection && csvSortColumn >= 0){
    rows.sort((a,b) => csvSortDirection * (AtelierCsv.compare(a.cells[csvSortColumn], b.cells[csvSortColumn]) || a.index - b.index));
  }
  return rows;
}

function renderCsv(resetLimit){
  if(!isCsv || !cm) return;
  if(resetLimit) csvVisibleRows = 750;
  csvParsed = AtelierCsv.parse(cm.getValue());
  const head = csvTable.tHead, body = csvTable.tBodies[0];
  head.textContent = ""; body.textContent = "";
  const headers = csvParsed.rows[0] || [];
  const allRows = csvRowsForView();
  const shown = allRows.slice(0, csvVisibleRows);
  csvEmpty.style.display = headers.length ? "none" : "block";
  csvTable.style.display = headers.length ? "table" : "none";
  if(headers.length){
    const tr = document.createElement("tr");
    const corner = document.createElement("th"); corner.className = "csvIndex"; corner.textContent = "#"; tr.appendChild(corner);
    headers.forEach((value,index) => {
      const th = document.createElement("th");
      th.scope = "col"; th.title = value || ("Colonne " + (index + 1));
      th.appendChild(document.createTextNode(value || ("Colonne " + (index + 1))));
      if(index === csvSortColumn && csvSortDirection){
        const mark = document.createElement("span"); mark.className = "csvSort"; mark.textContent = csvSortDirection > 0 ? "▲" : "▼"; th.appendChild(mark);
      }
      th.onclick = () => {
        if(csvSortColumn !== index){ csvSortColumn = index; csvSortDirection = 1; }
        else csvSortDirection = csvSortDirection === 1 ? -1 : csvSortDirection === -1 ? 0 : 1;
        renderCsv(false);
      };
      tr.appendChild(th);
    });
    head.appendChild(tr);
  }
  const fragment = document.createDocumentFragment();
  shown.forEach(row => {
    const tr = document.createElement("tr");
    const index = document.createElement("td"); index.className = "csvIndex"; index.textContent = String(row.index + 2); tr.appendChild(index);
    row.cells.forEach(value => { const td = document.createElement("td"); csvCell(td, value); tr.appendChild(td); });
    fragment.appendChild(tr);
  });
  body.appendChild(fragment);
  const delimiterLabel = csvParsed.delimiter === "\t" ? "tab" : csvParsed.delimiter;
  csvMeta.textContent = allRows.length.toLocaleString() + " lignes × " + csvParsed.width + " colonnes · séparateur " + delimiterLabel;
  csvMore.style.display = allRows.length > shown.length ? "block" : "none";
  csvMore.textContent = "Afficher " + Math.min(750, allRows.length - shown.length).toLocaleString() + " lignes de plus";
}

function setCsvMode(mode){
  if(!isCsv) return;
  csvMode = mode === "source" ? "source" : "table";
  localStorage.setItem("csvViewMode", csvMode);
  const table = csvMode === "table";
  csvTableBtn.setAttribute("aria-pressed", String(table));
  csvSourceBtn.setAttribute("aria-pressed", String(!table));
  csvSearch.style.display = table ? "" : "none";
  csvMeta.style.display = table ? "" : "none";
  document.getElementById("ed").style.display = table ? "none" : "flex";
  csvView.classList.toggle("show", table);
  wrapSel.style.display = table ? "none" : "";
  if(table) renderCsv(true); else if(cm) setTimeout(() => cm.refresh(), 0);
}

if(isCsv){
  csvTools.classList.add("show");
  csvTableBtn.onclick = () => setCsvMode("table");
  csvSourceBtn.onclick = () => setCsvMode("source");
  let csvSearchTimer = null;
  csvSearch.oninput = () => { clearTimeout(csvSearchTimer); csvSearchTimer = setTimeout(() => renderCsv(true), 100); };
  csvMore.onclick = () => { csvVisibleRows += 750; renderCsv(false); };
}

const stateEl = document.getElementById("state");
function setState(cls, txt){ stateEl.className = cls; stateEl.textContent = txt; }

// word wrap (VS Code-style): off | window | fixed column (80/100/120)
const wrapSel = document.getElementById("wrapSel");
function applyWrap(v){
  localStorage.setItem("cmWrap", v);
  const fixed = /^\d+$/.test(v);
  if(cm){
    const w = cm.getWrapperElement();
    // cap the editor itself (not the container) so the gap beside it stays
    // the editor's own colour (#212121) instead of a black panel; thin guide marks the column
    w.style.maxWidth = fixed ? ("calc(" + v + "ch + 70px)") : "";
    w.style.borderRight = fixed ? "1px solid #33384a" : "";
    cm.setOption("lineWrapping", v !== "off");
    cm.refresh();
  }
}
const wrapCustom = document.getElementById("wrapCustom");
function ensureWrapOption(v){
  if(/^\d+$/.test(v) && !wrapSel.querySelector('option[value="'+v+'"]')){
    const o=document.createElement("option"); o.value=v; o.textContent="Wrap: "+v;
    wrapSel.insertBefore(o, wrapSel.querySelector('option[value="custom"]'));
  }
}
ensureWrapOption(localStorage.getItem("cmWrap") || "");
wrapSel.value = localStorage.getItem("cmWrap") || "win";
if(!wrapSel.value) wrapSel.value = "win";
wrapSel.onchange = () => {
  if(wrapSel.value === "custom"){
    wrapSel.style.display="none"; wrapCustom.style.display="";
    const cur=localStorage.getItem("cmWrap")||"";
    wrapCustom.value=/^\d+$/.test(cur)?cur:""; wrapCustom.focus(); wrapCustom.select();
    return;
  }
  applyWrap(wrapSel.value);
};
function commitWrapCustom(){
  wrapCustom.style.display="none"; wrapSel.style.display="";
  const n=parseInt(wrapCustom.value,10);
  if(n>0){ const v=String(n); ensureWrapOption(v); wrapSel.value=v; applyWrap(v); }
  else wrapSel.value = localStorage.getItem("cmWrap") || "win";
}
wrapCustom.addEventListener("keydown", e => {
  if(e.key==="Enter") commitWrapCustom();
  else if(e.key==="Escape"){ wrapCustom.style.display="none"; wrapSel.style.display="";
    wrapSel.value = localStorage.getItem("cmWrap") || "win"; }
});
wrapCustom.addEventListener("blur", commitWrapCustom);

// historique de versions + comparaison in-editor (module partagé diff_versions.js,
// même mécanique que latex_studio : ⌘S ou modif externe crée une version)
let lastSavedText = null;
const __dv = DiffVersions({
  getCm: () => cm,
  path,
  notify: (m) => setState("saved", m),
  els: {
    group: document.getElementById("diffGrp"),
    tag: document.getElementById("diffTag"),
    prev: document.getElementById("diffPrev"),
    next: document.getElementById("diffNext"),
    restore: document.getElementById("diffRestore"),
  },
  restoreText: async (text) => {
    const r = await fetch("/codesave", {method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({path, text, mtime: diskMtime})});
    const j = await r.json();
    if(j.error) return false;
    diskMtime = j.mtime; cm.setValue(text); dirty = false; lastSavedText = text;
    setState("saved", "version restaurée");
    return true;
  },
});

async function load(){
  const r = await fetch("/code?path=" + encodeURIComponent(path));
  const j = await r.json();
  if(j.error){ setState("conflict", j.error); return; }
  recentsAdd(path);
  diskMtime = j.mtime;
  if(!cm){
  let __rsT=null;
  window.addEventListener("resize", () => { clearTimeout(__rsT); __rsT=setTimeout(() => { if(cm) cm.refresh(); }, 120); });
    cm = AtelierEditorFactory.createEditor({
      parent: document.getElementById("ed"), value: j.text, ext,
      wrap: true, readOnly: false, defaultEngine: "cm6",
    });
    window.cm = cm;
    cm.on("change", (_, ch) => { if(ch.origin !== "setValue"){ dirty = true; setState("dirty", "modified"); } });
    let selT = null;
    cm.on("cursorActivity", () => {
      clearTimeout(selT);
      selT = setTimeout(() => {
        const sel = cm.getSelection();
        if(sel && sel.trim()){
          const f = cm.getCursor("from"), t = cm.getCursor("to");
          if(window._clMark) window._clMark.clear();
          window._clMark = cm.markText(f, t, {className: "cm-clsel"});
          fetch("/selinfo", {method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
              lines: t.line - f.line + 1,
              words: sel.trim().split(/\s+/).length,
              text: sel, rel: path, name: path.split("/").pop(),
              page: "L" + (f.line+1) + "-" + (t.line+1)
            })}).catch(()=>{});
        }
      }, 200);
    });
  } else {
    const cur = cm.getCursor();
    cm.setValue(j.text);
    cm.setCursor(cur);
  }
  applyWrap(wrapSel.value);
  if(isCsv) setCsvMode(csvMode);
  lastSavedText = j.text;
  dirty = false;
  setState("saved", "saved");
}

async function readConflictSnapshot(fallbackMtime, knownText){
  if(typeof knownText === "string") return {mtime: fallbackMtime, text: knownText};
  try{
    const r = await fetch("/code?path=" + encodeURIComponent(path));
    const j = await r.json();
    if(typeof j.text === "string" && Number.isFinite(Number(j.mtime))) return {mtime: j.mtime, text: j.text};
  }catch(e){}
  return null;
}

async function reloadDiskConflict(mtime, knownText){
  const snapshot = await readConflictSnapshot(mtime, knownText);
  if(!snapshot || !cm) return false;
  const before = (typeof lastSavedText === "string") ? lastSavedText : cm.getValue();
  const cur = cm.getCursor(), scroll = cm.getScrollInfo();
  cm.setValue(snapshot.text); cm.setCursor(cur); cm.scrollTo(scroll.left, scroll.top);
  diskMtime = snapshot.mtime; lastSavedText = snapshot.text; dirty = false;
  setState("saved", "version de l'agent rechargée " + new Date().toLocaleTimeString());
  if(before !== snapshot.text && __dv) {
    __dv.push(before, snapshot.text, {source:"external-reload", status:"applied"});
  }
  if(isCsv && csvMode === "table") renderCsv(true);
  return false;
}

async function save(){
  if(!cm) return false;
  const r = await fetch("/codesave", {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({path, text: cm.getValue(), mtime: diskMtime})});
  const j = await r.json();
  if(j.error === "conflit") return reloadDiskConflict(j.mtime);
  if(j.error){ setState("conflict", j.error); return false; }
  diskMtime = j.mtime;
  dirty = false;
  setState("saved", "saved " + new Date().toLocaleTimeString());
  // versionner AUSSI tes propres modifications (une version par sauvegarde)
  const savedNow = cm.getValue();
  if(lastSavedText !== null) __dv.push(lastSavedText, savedNow, {source:"user-save", status:"applied"});
  lastSavedText = savedNow;
  return true;
}

document.addEventListener("keydown", e => {
  if(e.key === "Escape"){
    if(cm){ cm.setCursor(cm.getCursor()); }
    if(window._clMark){ window._clMark.clear(); window._clMark = null; }
    fetch("/selinfo", {method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({lines:0, words:0})}).catch(()=>{});
    return;
  }
  if((e.metaKey || e.ctrlKey) && e.key === "s"){ e.preventDefault(); save(); }
});

// Politique agent-prioritaire : toute écriture externe remplace immédiatement
// le buffer affiché, même s'il contient des modifications locales non sauvegardées.
setInterval(async () => {
  if(!cm) return;
  // vue historique du comparateur (± timeline) : buffer temporairement remplacé —
  // ne pas recharger le disque par-dessus (restauré à la sortie de la vue)
  if(typeof __dv !== "undefined" && __dv && __dv.isBusy && __dv.isBusy()) return;
  try{
    const r = await fetch("/code?path=" + encodeURIComponent(path));
    const j = await r.json();
    if(!(j.mtime && Math.abs(j.mtime - diskMtime) > 0.001)) return;
    const diskText = j.text;
    const cur = cm.getCursor(), scroll = cm.getScrollInfo();
    diskMtime = j.mtime;
    const before = (typeof lastSavedText === "string") ? lastSavedText : cm.getValue();
    if(before === diskText && cm.getValue() === diskText){ lastSavedText = diskText; dirty = false; return; }
    cm.setValue(diskText);
    cm.setCursor(cur);
    cm.scrollTo(scroll.left, scroll.top);
    dirty = false;
    setState("saved", "version de l'agent rechargée " + new Date().toLocaleTimeString());
    if(before !== diskText && __dv) __dv.push(before, diskText, {source:"external-reload", status:"applied"});
    lastSavedText = diskText;
    if(isCsv && csvMode === "table") renderCsv(true);
  }catch(e){}
}, 2000);

if(path) load();


// recent files (shared between studio and editor via localStorage)
function recentsGet(){ try{return JSON.parse(localStorage.getItem("studioRecents")||"[]")}catch(e){return []} }
function recentsAdd(p){
  let r = recentsGet().filter(x => x !== p);
  r.unshift(p); r = r.slice(0, 10);
  localStorage.setItem("studioRecents", JSON.stringify(r));
}
function openTarget(target){
  const page = target.endsWith(".tex") ? "latex_studio.html" : "code_editor.html";
  location.href = "/.fig_thumbs/" + page + "?path=" + encodeURIComponent(target);
}
// --- mini file explorer (Open button) ---
const EDITABLE = /\.(tex|sty|bib|py|r|R|md|jl|sh|bash|txt|csv|json|yaml|yml|toml)$/;
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
async function pickerShow(dir){
  const r = await fetch("/ls?dir=" + encodeURIComponent(dir || (path ? path.replace(/\/[^/]*$/, "") : "")));
  const j = await r.json();
  if(j.error) return;
  document.getElementById("picker").classList.add("show");
  document.getElementById("pickerPath").textContent = j.path.replace(/^\/Users\/[^/]+/, "~");
  const list = document.getElementById("pickerList");
  list.innerHTML = "";
  const mk = (label, cls, fn) => {
    const d = document.createElement("div");
    d.innerHTML = label; d.className = cls; d.onclick = fn;
    list.appendChild(d);
  };
  const rec = recentsGet().filter(p => p !== path);
  if(rec.length){
    rec.forEach(p => mk("&#128337; " + esc(p.split("/").pop()) +
      ' <span style="color:var(--muted);font-size:11px">' + esc(p.replace(/^\/Users\/[^/]+\/Documents\//, "").replace(/\/[^/]*$/, "")) + "</span>",
      "", () => openTarget(p)));
    const sep = document.createElement("div");
    sep.style.cssText = "border-bottom:1px solid var(--border);margin:4px 0;padding:0;height:1px;cursor:default";
    list.appendChild(sep);
  }
  if(j.parent) mk("&#8617; ..", "d", () => pickerShow(j.parent));
  j.items.filter(i => i.dir).forEach(i => mk("&#128193; " + esc(i.name), "d", () => pickerShow(j.path + "/" + i.name)));
  j.items.filter(i => !i.dir && EDITABLE.test(i.name)).forEach(i =>
    mk(esc(i.name), "", () => openTarget(j.path + "/" + i.name)));
}
document.getElementById("picker").onclick = e => { if(e.target.id === "picker") e.target.classList.remove("show"); };
document.addEventListener("keydown", e => { if(e.key === "Escape") document.getElementById("picker").classList.remove("show"); });

document.getElementById("openFile").onclick = () => pickerShow();
</script>
