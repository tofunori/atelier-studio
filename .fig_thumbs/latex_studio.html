  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);

  #helpPop{position:fixed;top:44px;right:10px;z-index:400;display:none;flex-direction:column;gap:7px;

  #marker{position:absolute;left:0;right:0;height:22px;background:rgba(91,157,255,.25);
          border-left:3px solid var(--accent);pointer-events:none;display:none;z-index:5}
  .cm-syncline{background:rgba(91,157,255,.18)}
  /* selection hugs the text (mark-selection) instead of filling the whole line */
  .CodeMirror .CodeMirror-selected{background:transparent !important}
  .CodeMirror-focused .CodeMirror-selected{background:transparent !important}
  .CodeMirror-selectedtext{background:rgba(91,157,255,.45) !important;box-shadow:none !important;border-radius:2px}
  /* last selection sent to Claude: persistent marker */

             max-height:70vh;display:flex;flex-direction:column;overflow:hidden;
             box-shadow:0 8px 40px rgba(0,0,0,.6)}
  #pickerPath{padding:10px 14px;font-size:11.5px;color:var(--muted);border-bottom:1px solid var(--border);
              white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #pickerList{overflow-y:auto;flex:1}
  #pickerList div{padding:7px 14px;font-size:13px;cursor:pointer;display:flex;gap:8px}
  #pickerList div:hover{background:var(--border)}
  #pickerList .d{color:var(--accent)}
  /* selection pill + annotation card (same language as the gallery/HTML overlay) */
  #selPill{position:fixed;z-index:300;display:none;align-items:center;gap:10px;min-width:320px;max-width:460px;
      background:#1d2026;border:1px solid #343842;border-radius:24px;padding:8px 8px 8px 16px;
      box-shadow:0 12px 36px rgba(0,0,0,.45);color:var(--txt);font-size:13px;user-select:none;-webkit-user-select:none}
  #selPill .nb{font-size:14px;flex:none;line-height:1}

      font-size:13px;line-height:1.45;padding:0;resize:none;font-family:inherit;height:20px;max-height:120px}
  #selPill textarea::placeholder{color:#6d7480}
  #selPill button{border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
  #selPill .del{width:26px;height:26px;border-radius:50%;background:none;color:#6d7480;flex:none;padding:0}
  #selPill .del:hover{color:#ff7a76}

      stroke-linecap:round;stroke-linejoin:round}

      border:1px solid #3a4150;color:var(--muted);font-size:14px;flex:none}
  #selPill .tgt:hover,#selPill .tgt.set{border-color:#5b9dff;color:#5b9dff}
  #selPill .go{width:32px;height:32px;border-radius:50%;background:#c96442;color:#fff;font-size:16px;flex:none}
  #selPill .go:hover{background:#e0714a}
  #tgMenu{position:fixed;z-index:302;display:none;flex-direction:column;min-width:240px;max-width:400px;
      background:rgba(24,27,34,.98);border:1px solid #3a4150;border-radius:12px;padding:6px;
      box-shadow:0 14px 48px rgba(0,0,0,.55);color:var(--txt);font-size:12.5px}
  #tgMenu .hd{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:5px 9px 3px}
  #tgMenu .it{display:flex;gap:8px;align-items:center;padding:7px 9px;border-radius:8px;cursor:pointer}

  #tgMenu .it .app{flex:none;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
      color:#8ab4ff;border:1px solid #33415e;border-radius:5px;padding:1px 5px}
  #tgMenu .it .t{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #tgMenu .it.on .t{color:#8ab4ff}

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "/.fig_thumbs/pdfjs/pdf.worker.min.js";
const path = new URLSearchParams(location.search).get("path");
const isPdfMode = new URLSearchParams(location.search).get("mode") === "pdf";
// cross-tab sync (editor tab <-> PDF tab): synctex jumps + reload after compile
const bc = ("BroadcastChannel" in window && path) ? new BroadcastChannel("latexstudio:" + path) : null;
let pdfPath = path ? path.replace(/\.tex$/, ".pdf") : null;
// single initial-load trigger: resolve the real PDF path first, THEN load once
// (two concurrent getDocument() calls can deadlock pdf.js worker startup)
if(path) fetch("/texroot?path=" + encodeURIComponent(path)).then(r=>r.json()).then(j=>{
  if(j.pdf) pdfPath = j.pdf;
  loadPdf();
}).catch(()=>{ loadPdf(); });
const _base = path ? path.split("/").pop() : "(no file)";
document.getElementById("fname").textContent = _base;
document.title = isPdfMode ? _base + " — PDF" : _base;

let cm = null, diskMtime = 0, dirty = false, pdfDoc = null, pageEls = [], pdfVps = [];
let zoom = parseFloat(localStorage.getItem("texZoom") || "1");
const stateEl = document.getElementById("state");
const setState = (cls, txt) => { stateEl.className = cls; stateEl.textContent = txt; stateEl.title = txt; };
const ddot = document.getElementById("ddot");

// word wrap (VS Code-style): off | window | fixed column (80/100/120)
const wrapSel = document.getElementById("wrapSel");
function applyWrap(v){
  localStorage.setItem("cmWrap", v);
  const fixed = /^\d+$/.test(v);
  if(cm){
    const w = cm.getWrapperElement();
    // gap beside a capped editor stays #212121 (the editor's own colour, set on #left)
    // instead of a black panel; thin border marks the chosen column
    w.style.maxWidth = fixed ? ("calc(" + v + "ch + 70px)") : "";
    w.style.borderRight = fixed ? "1px solid #33384a" : "";
    cm.setOption("lineWrapping", v !== "off");
    cm.refresh();
  }
}
wrapSel.value = localStorage.getItem("cmWrap") || "win";
wrapSel.onchange = () => applyWrap(wrapSel.value);

async function load(){
  const r = await fetch("/code?path=" + encodeURIComponent(path));
  const j = await r.json();
  if(j.error) return setState("err", j.error);
  recentsAdd(path);
  diskMtime = j.mtime;
  // re-mesurer CodeMirror quand le panneau est redimensionné (sinon les
  // retours de ligne gardent l'ancienne largeur et l'affichage se décale)
  let __rsT=null;
  window.addEventListener("resize", () => {
    clearTimeout(__rsT);
    __rsT=setTimeout(() => { if(cm) cm.refresh(); }, 120);
  });
  cm = CodeMirror(document.getElementById("left"), {
    value: j.text, mode: "stex", theme: "material-darker",
    lineNumbers: true, lineWrapping: true, viewportMargin: 50, styleSelectedText: true
  });
  cm.on("change", (_, ch) => { if(ch.origin !== "setValue"){ dirty = true; ddot.style.display = "inline"; setState("dirty", "modified"); } });
  let selT = null;
  cm.on("cursorActivity", () => {
    clearTimeout(selT);
    selT = setTimeout(() => {
      const sel = cm.getSelection();
      const f = cm.getCursor("from"), t = cm.getCursor("to");
      if(sel && sel.trim()){
        if(window._clMark) window._clMark.clear();
        window._clMark = cm.markText(f, t, {className: "cm-clsel"});
        fetch("/selinfo", {method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({
            lines: t.line - f.line + 1, words: sel.trim().split(/\s+/).length,
            text: sel, rel: path, name: path.split("/").pop(),
            page: "L" + (f.line+1) + "-" + (t.line+1)
          })}).catch(()=>{});
        selPillShow(f, t, sel);
      } else { selHide(); }
    }, 200);
  });
  applyWrap(wrapSel.value);
  // Rewrap façon VS Code (extension Rewrap, Alt+Q) : reformate RÉELLEMENT le
  // paragraphe courant (ou la sélection) à 80 colonnes — chaque ligne visible
  // redevient une vraie ligne numérotée.
  function rewrapPar(){
    // colonne = largeur visible du panneau (moins gutter/marge), bornée 40-120 :
    // après rewrap, chaque ligne rentre dans le panneau → un numéro par ligne
    const gutter = cm.getGutterElement().offsetWidth;
    const col = Math.max(40, Math.min(120,
      Math.floor((cm.getWrapperElement().clientWidth - gutter - 16) / cm.defaultCharWidth())));
    let from, to;
    if(cm.somethingSelected()){
      from = cm.getCursor("from").line; to = cm.getCursor("to").line;
    } else {
      const cur = cm.getCursor().line, last = cm.lineCount()-1;
      from = cur; while(from>0 && cm.getLine(from-1).trim()!=="") from--;
      to = cur; while(to<last && cm.getLine(to+1).trim()!=="") to++;
    }
    const lines=[]; for(let i=from;i<=to;i++) lines.push(cm.getLine(i));
    const indent=(lines[0].match(/^\s*/)||[""])[0];
    const words=lines.map(l=>l.trim()).join(" ").split(/\s+/).filter(Boolean);
    const out=[]; let curL="";
    for(const w of words){
      if(!curL) curL=indent+w;
      else if((curL+" "+w).length<=col) curL+=" "+w;
      else { out.push(curL); curL=indent+w; }
    }
    if(curL) out.push(curL);
    cm.replaceRange(out.join("\n"), {line:from,ch:0}, {line:to,ch:cm.getLine(to).length});
  }
  cm.addKeyMap({"Alt-Q": rewrapPar});
  document.getElementById("rewrapBtn").onclick = () => { rewrapPar(); cm.focus(); };

  // Rewrap façon VS Code : les lignes repliées s'alignent sous le début du
  // texte de la ligne (indentation préservée), pas sous le gutter.
  (function(){
    const basePad = 4;
    cm.on("renderLine", function(cm, line, elt){
      const off = CodeMirror.countColumn(line.text, null, cm.getOption("tabSize")) * cm.defaultCharWidth();
      elt.style.textIndent = "-" + off + "px";
      elt.style.paddingLeft = (basePad + off) + "px";
    });
    cm.refresh();
  })();

  // initial loadPdf is triggered by the /texroot resolution (single-trigger rule)
}

async function save(){
  const r = await fetch("/codesave", {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({path, text: cm.getValue(), mtime: diskMtime})});
  const j = await r.json();
  if(j.error === "conflit"){ setState("err", "disk conflict — re-⌘S to overwrite"); diskMtime = j.mtime; return false; }
  diskMtime = j.mtime; dirty = false; ddot.style.display = "none"; setState("ok", "saved");
  return true;
}

async function compile(){
  if(dirty && !(await save())) return;
  setState("dirty", "compiling…");
  const r = await fetch("/compile", {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({path})});
  const j = await r.json();
  if(!j.ok) return setState("err", "✗ " + (j.error || "failed"));
  if(j.pdf) pdfPath = j.pdf;
  setState("ok", "✓ compiled " + new Date().toLocaleTimeString());
  loadPdf();
  if(bc) bc.postMessage({t: "compiled"});   // PDF tabs reload themselves
}

let _pdfToken = 0;
async function loadPdf(){
  const tok = ++_pdfToken;
  try{
    const doc = await pdfjsLib.getDocument({url: "/raw?path=" + encodeURIComponent(pdfPath) + "&t=" + Date.now(),
      standardFontDataUrl: "/.fig_thumbs/pdfjs/standard_fonts/", cMapUrl: "/.fig_thumbs/pdfjs/cmaps/", cMapPacked: true}).promise;
    if(tok !== _pdfToken) return;
    pdfDoc = doc;
    const right = document.getElementById("right");
    const scroll = right.scrollTop;
    [...right.querySelectorAll(".pdfpage")].forEach(e => e.remove());
    pageEls = []; pdfVps = [];
    _lastW = right.clientWidth;
    const w = (right.clientWidth - 24) * zoom;
    for(let n = 1; n <= doc.numPages; n++){
      if(tok !== _pdfToken) return;
      const page = await doc.getPage(n);
      const base = page.getViewport({scale: 1});
      const scale = w / base.width;
      const vp = page.getViewport({scale});
      const div = document.createElement("div");
      div.className = "pdfpage"; div.dataset.page = n;
      div.style.width = vp.width + "px"; div.style.height = vp.height + "px";
      const cv = document.createElement("canvas");
      cv.width = vp.width * devicePixelRatio; cv.height = vp.height * devicePixelRatio;
      cv.style.width = vp.width + "px"; cv.style.height = vp.height + "px";
      div.appendChild(cv);
      right.appendChild(div);
      pageEls[n] = div; pdfVps[n] = {scale, h: base.height};
      const ctx = cv.getContext("2d");
      ctx.scale(devicePixelRatio, devicePixelRatio);
      await page.render({canvasContext: ctx, viewport: vp, intent: "print"}).promise;
      div.onclick = e => {
        const r2 = div.getBoundingClientRect();
        synctexEdit(n, (e.clientX - r2.left) / pdfVps[n].scale, (e.clientY - r2.top) / pdfVps[n].scale);
      };
    }
    right.scrollTop = scroll;
  }catch(e){ console.warn("loadPdf:", e); /* souvent: pas encore de PDF */ }
}

function showMarker(page, y0){
  if(!pageEls[page]) return false;
  const el = pageEls[page], vp = pdfVps[page];
  const y = y0 * vp.scale;
  const marker = document.getElementById("marker");
  el.appendChild(marker);
  marker.style.top = (y - 14) + "px";
  marker.style.display = "block";
  el.scrollIntoView({block:"nearest"});
  document.getElementById("right").scrollTop = el.offsetTop + y - document.getElementById("right").clientHeight/2;
  setTimeout(() => marker.style.display = "none", 2500);
  return true;
}

async function synctexView(){
  if(!cm) return;
  const line = cm.getCursor().line + 1;
  const r = await fetch("/synctex", {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({dir:"view", tex: path, pdf: pdfPath, line})});
  const j = await r.json();
  if(!j.page) return setState("err", "synctex: no match");
  if(bc) bc.postMessage({t: "view", page: j.page, y: j.y});   // separate PDF tabs scroll too
  if(pdfDoc && !showMarker(j.page, j.y) ) setState("err", "synctex: page not rendered");
}

let lastSyncLine = null;
function jumpToLine(line){
  if(!cm) return;
  const ln = line - 1;
  cm.setCursor({line: ln, ch: 0});
  cm.scrollIntoView({line: ln, ch: 0}, 120);
  if(lastSyncLine !== null) cm.removeLineClass(lastSyncLine, "background", "cm-syncline");
  cm.addLineClass(ln, "background", "cm-syncline");
  lastSyncLine = ln;
  cm.focus();
}
async function synctexEdit(page, x, y){
  const r = await fetch("/synctex", {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({dir:"edit", tex: path, pdf: pdfPath, page, x, y})});
  const j = await r.json();
  if(!j.line) return setState("err", "synctex: no match");
  if(cm) jumpToLine(j.line);
  if(bc) bc.postMessage({t: "jump", line: j.line});   // editor tab jumps when we're the PDF tab
}
if(bc) bc.onmessage = e => {
  const m = e.data || {};
  if(isPdfMode){
    if(m.t === "compiled") loadPdf();
    else if(m.t === "view") showMarker(m.page, m.y);
  } else if(m.t === "jump"){
    jumpToLine(m.line);
  }
};

// --- selection pill: annotate + send directly to the Claude session (same flow
//     as the figure pill and the HTML report overlay; /quote with direct:true) ---
const selPill = document.getElementById("selPill");
const selTa = selPill.querySelector("textarea");
  // Mode Studio : pilule simple « Add to chat » (comme la sélection du chat) —
  // pas de commentaire ni corbeille, le texte part en puce dans le composer.
  if (window.self!==window.top){
    var __go = selPill.querySelector('.go');
    ['textarea','.del','.tgt','.nb'].forEach(function(sel){
      var el = selPill.querySelector(sel); if (el) el.style.display = 'none';
    });
    selPill.style.cssText += ';background:transparent;border:none;box-shadow:none;padding:0;min-width:0;width:auto';
    if (__go){ __go.innerHTML = '&#128172;&nbsp; Add to chat';
      __go.style.cssText = 'width:auto;min-width:0;height:auto;border-radius:999px;padding:7px 14px;font-size:13px;white-space:nowrap;background:#2c313a;color:#e6e6e6;border:1px solid #3a414d;box-shadow:0 6px 18px rgba(0,0,0,0.5);cursor:pointer'; }
  }

let lastSel = null;
function selPillShow(f, t, sel){
  // don't reposition/steal focus while the user is typing a comment
  if(selPill.style.display === "flex" && (document.activeElement === selTa || selTa.value)) return;
  lastSel = {text: sel, page: "L" + (f.line+1) + "-" + (t.line+1)};
  const c = cm.charCoords(t, "window");
  selPill.style.display = "flex";
  const w = selPill.offsetWidth, h = selPill.offsetHeight;
  let x = Math.min(Math.max(8, c.left - w/2), innerWidth - w - 8);
  let y = c.bottom + 10;
  if(y + h > innerHeight - 8) y = c.top - h - 10;
  selPill.style.left = x + "px"; selPill.style.top = Math.max(8, y) + "px";
}
function selHide(){ selPill.style.display = "none"; }
function selCancel(){
  selHide(); lastSel = null; selTa.value = "";
  if(cm) cm.setCursor(cm.getCursor());
  if(window._clMark){ window._clMark.clear(); window._clMark = null; }
  fetch("/selinfo", {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({lines:0, words:0})}).catch(()=>{});
}
const __EMB=(function(){try{return window.self!==window.top;}catch(e){return true;}})();
function selSend(){
  if(!lastSel) return;
  const comment = selTa.value.trim();
  const go = selPill.querySelector(".go");
  go.textContent = "⏳";
  fetch("/quote", {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({rel: path, page: lastSel.page, text: lastSel.text, comment: comment || "", direct: true, target: __ct(), embed: __EMB})})
    .then(r => r.json())
    .then(j => { if(__EMB && j && j.message) window.top.postMessage({type:'atelier-add-to-chat', text:j.message}, '*');
      go.textContent = "✓"; setTimeout(() => { go.textContent = "↑"; selTa.value = ""; selHide(); }, 1200); })
    .catch(() => { go.textContent = "!"; setTimeout(() => { go.textContent = "↑"; }, 1600); });
}
// clicks on the bar must not destroy the selection — except the textarea, which needs focus
selPill.addEventListener("mousedown", e => { if(e.target !== selTa) e.preventDefault(); });
selPill.querySelector(".go").onclick = () => selSend();
selPill.querySelector(".del").onclick = e => { e.stopPropagation(); selCancel(); };
/* ---- Claude-session target picker (stores localStorage 'claudeTargetV1') ---- */
(function(){
  const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const tgtBtn = selPill.querySelector(".tgt"), tgMenu = document.getElementById("tgMenu");
  if(__EMB) tgtBtn.style.display = "none";
  const markTgt = () => tgtBtn.classList.toggle("set", !!__ct());
  markTgt();
  tgMenu.addEventListener("mousedown", e => e.preventDefault());
  tgtBtn.onclick = async e => {
    e.stopPropagation();
    const cur = __ct();
    let html = '<div class="hd">Envoyer vers</div>'
      + '<div class="it' + (cur ? '' : ' on') + '" data-i="-1"><span class="app">auto</span>'
      + '<span class="t">Session du projet (auto)</span></div>';
    try{
      const j = await (await fetch("/claude-targets")).json();
      (j.targets || []).forEach((t, i) => {
        const on = cur && cur.app === t.app && cur.id === t.id;
        html += '<div class="it' + (on ? ' on' : '') + '" data-i="' + i + '"><span class="app">'
          + esc(t.app) + '</span><span class="t">' + esc(t.title || t.id)
          + (t.inProject ? '' : ' — ' + esc(String(t.cwd || '').split('/').pop())) + '</span></div>';
      });
      tgMenu.innerHTML = html;
      tgMenu.style.display = "flex";
      const r = tgtBtn.getBoundingClientRect();
      tgMenu.style.left = Math.max(8, Math.min(r.left - 120, innerWidth - tgMenu.offsetWidth - 8)) + "px";
      tgMenu.style.top = Math.max(8, r.top - tgMenu.offsetHeight - 10) + "px";
      tgMenu.querySelectorAll(".it").forEach(it => {
        it.onclick = ev => {
          ev.stopPropagation();
          const i = +it.dataset.i;
          if(i < 0) localStorage.removeItem("claudeTargetV1");
          else localStorage.setItem("claudeTargetV1", JSON.stringify({app:j.targets[i].app, id:j.targets[i].id, title:j.targets[i].title}));
          markTgt(); tgMenu.style.display = "none";
        };
      });
      document.addEventListener("click", function h(){ tgMenu.style.display = "none"; document.removeEventListener("click", h); });
    }catch(err){ console.warn("claude-targets failed", err); }
  };
})();
selTa.addEventListener("input", () => { selTa.style.height = "20px"; selTa.style.height = Math.min(120, selTa.scrollHeight) + "px"; });
selTa.addEventListener("keydown", e => {
  e.stopPropagation();
  if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); selSend(); }
  else if(e.key === "Escape"){ e.preventDefault(); selCancel(); }
});

document.getElementById("build").onclick = compile;
document.getElementById("saveBtn").onclick = () => save();
document.getElementById("reloadPdf").onclick = () => loadPdf();
const helpPop = document.getElementById("helpPop");
document.getElementById("helpBtn").onclick = e => {
  e.stopPropagation();
  helpPop.style.display = helpPop.style.display === "flex" ? "none" : "flex";
};
document.addEventListener("click", () => { helpPop.style.display = "none"; });
const rightEl = document.getElementById("right");
function applyPdfVisible(v){
  if(isPdfMode) return;                       // PDF tab: the PDF pane is the whole view
  rightEl.style.display = v ? "" : "none";
  document.getElementById("left").style.width = v ? "50%" : "100%";
  document.getElementById("left").style.borderRight = v ? "" : "none";
  document.getElementById("togglePdf").classList.toggle("on", v);
  localStorage.setItem("texPdfVisible", v ? "1" : "0");
  if(cm) cm.refresh();
}
document.getElementById("togglePdf").onclick = () => applyPdfVisible(rightEl.style.display === "none");
function setZoom(z){
  zoom = Math.max(0.4, Math.min(3, z));
  localStorage.setItem("texZoom", zoom);
  loadPdf();
}
document.getElementById("zoomIn").onclick = () => setZoom(zoom * 1.2);
document.getElementById("zoomOut").onclick = () => setZoom(zoom / 1.2);
document.getElementById("zoomFit").onclick = () => setZoom(1);
let _rzT = null, _lastW = 0;
new ResizeObserver(() => {
  clearTimeout(_rzT);
  _rzT = setTimeout(() => {
    const w = rightEl.clientWidth;
    if(pdfDoc && Math.abs(w - _lastW) > 8){ _lastW = w; loadPdf(); }
  }, 500);
}).observe(rightEl);
document.getElementById("popPdf").onclick = () => {
  // synctex-aware PDF tab (same studio in mode=pdf; BroadcastChannel links the two)
  const __pdfUrl = "/.fig_thumbs/latex_studio.html?path=" + encodeURIComponent(path) + "&mode=pdf";
  if(window.self !== window.top){
    // embarqué dans Atelier Studio : ouvrir dans un onglet du panneau
    window.top.postMessage({type:'atelier-open-tab', url: __pdfUrl,
      title: (path.split("/").pop() || "PDF") + " — PDF"}, '*');
  } else {
    window.open(__pdfUrl, "_blank");
  }
  applyPdfVisible(false);
};
if(!isPdfMode && localStorage.getItem("texPdfVisible") === "0") applyPdfVisible(false);
document.addEventListener("keydown", e => {
  if(e.key === "Escape"){
    if(cm) selCancel();
    return;
  }
  if((e.metaKey || e.ctrlKey) && e.key === "s" && cm){ e.preventDefault(); save(); }
  if((e.metaKey || e.ctrlKey) && e.key === "b" && cm){ e.preventDefault(); compile(); }
  if((e.metaKey || e.ctrlKey) && e.key === "j" && cm){ e.preventDefault(); synctexView(); }
});

// reload if Claude edits the .tex on disk
setInterval(async () => {
  if(dirty || !cm) return;
  try{
    const r = await fetch("/code?path=" + encodeURIComponent(path));
    const j = await r.json();
    if(j.mtime && Math.abs(j.mtime - diskMtime) > 0.001){
      diskMtime = j.mtime;
      const cur = cm.getCursor(), s = cm.getScrollInfo();
      cm.setValue(j.text); cm.setCursor(cur); cm.scrollTo(s.left, s.top);
      dirty = false; setState("ok", "reloaded (modified on disk)");
    }
  }catch(e){}
}, 2000);

if(path && isPdfMode){
  document.body.classList.add("pdfmode");
  setState("ok", "clic dans le PDF → ligne source dans l'onglet éditeur");
  // initial loadPdf is triggered by the /texroot resolution above
} else if(path) load();
else {
  setState("ok", "choose a .tex file");
  pickerShow("");
}


// recent files (shared between studio and editor via localStorage)
function recentsGet(){ try{return JSON.parse(localStorage.getItem("studioRecents")||"[]")}catch(e){return []} }
function recentsAdd(p){
  let r = recentsGet().filter(x => x !== p);
  r.unshift(p); r = r.slice(0, 10);
  localStorage.setItem("studioRecents", JSON.stringify(r));
}
function openTarget(target){
  const page = target.endsWith(".tex") ? "latex_studio.html" : "code_editor.html";
  location.href = "/.fig_thumbs/" + page + "?path=" + encodeURIComponent(target);
}
// --- mini file explorer (Open button) ---
const EDITABLE = /\.(tex|sty|bib|py|r|R|md|jl|sh|bash|txt|csv|json|yaml|yml|toml)$/;
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
async function pickerShow(dir){
  const r = await fetch("/ls?dir=" + encodeURIComponent(dir || (path ? path.replace(/\/[^/]*$/, "") : "")));
  const j = await r.json();
  if(j.error) return;
  document.getElementById("picker").classList.add("show");
  document.getElementById("pickerPath").textContent = j.path.replace(/^\/Users\/[^/]+/, "~");
  const list = document.getElementById("pickerList");
  list.innerHTML = "";
  const mk = (label, cls, fn) => {
    const d = document.createElement("div");
    d.innerHTML = label; d.className = cls; d.onclick = fn;
    list.appendChild(d);
  };
  const rec = recentsGet().filter(p => p !== path);
  if(rec.length){
    rec.forEach(p => mk("&#128337; " + esc(p.split("/").pop()) +
      ' <span style="color:var(--muted);font-size:11px">' + esc(p.replace(/^\/Users\/[^/]+\/Documents\//, "").replace(/\/[^/]*$/, "")) + "</span>",
      "", () => openTarget(p)));
    const sep = document.createElement("div");
    sep.style.cssText = "border-bottom:1px solid var(--border);margin:4px 0;padding:0;height:1px;cursor:default";
    list.appendChild(sep);
  }
  if(j.parent) mk("&#8617; ..", "d", () => pickerShow(j.parent));
  j.items.filter(i => i.dir).forEach(i => mk("&#128193; " + esc(i.name), "d", () => pickerShow(j.path + "/" + i.name)));
  j.items.filter(i => !i.dir && EDITABLE.test(i.name)).forEach(i =>
    mk(esc(i.name), "", () => openTarget(j.path + "/" + i.name)));
}
document.getElementById("picker").onclick = e => { if(e.target.id === "picker") e.target.classList.remove("show"); };
document.addEventListener("keydown", e => { if(e.key === "Escape") document.getElementById("picker").classList.remove("show"); });

document.getElementById("openFile").onclick = () => pickerShow();
</script>
